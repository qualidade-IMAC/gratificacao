<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gestão de Gratificações</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- SheetJS para Leitura de Planilhas -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #e7e5e4; /* stone-200 fundo exterior */
            color: #1c1917; /* stone-950 */
            -webkit-tap-highlight-color: transparent;
        }
        
        .custom-scrollbar::-webkit-scrollbar { height: 6px; width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #e5e7eb; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #a8a29e; border-radius: 4px; }
        
        .card-shadow { box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06); }
        .modal-overlay { background-color: rgba(0, 0, 0, 0.6); backdrop-filter: blur(2px); }
        
        .animate-fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Loader */
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #eab308; /* yellow-500 */
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* iOS Style Print/PDF Configuration */
        @media print {
            @page { margin: 15mm; }
            body { 
                background-color: white !important; 
                -webkit-print-color-adjust: exact; 
                print-color-adjust: exact; 
            }
            .no-print, #login-screen { 
                display: none !important; 
            }
            #app-layout {
                display: block !important;
                max-width: none !important;
                box-shadow: none !important;
                background-color: white !important;
            }
            .print-card { 
                border-radius: 0 !important; 
                border: none !important; 
                padding: 0 !important; 
                box-shadow: none !important;
            }
            table { border-collapse: collapse !important; width: 100% !important; }
            th { background-color: #f9fafb !important; color: #374151 !important; border-bottom: 2px solid #e5e7eb !important; }
            td { border-bottom: 1px solid #f3f4f6 !important; }
        }
    </style>
</head>
<body class="font-sans antialiased overflow-x-hidden">

    <!-- Loading Overlay -->
    <div id="loading-overlay" class="fixed inset-0 bg-stone-100 z-50 flex flex-col items-center justify-center">
        <div class="loader mb-4"></div>
        <h2 class="text-xl font-bold text-stone-700 animate-pulse">A carregar sistema...</h2>
    </div>

    <!-- Ecrã de Login -->
    <div id="login-screen" class="hidden fixed inset-0 z-40 bg-stone-900 flex-col items-center justify-center p-4">
        <div class="bg-stone-100 rounded-2xl shadow-2xl p-8 max-w-sm w-full text-center animate-fade-in">
            <div class="w-20 h-20 bg-yellow-100 rounded-full flex items-center justify-center mx-auto mb-6">
                <i class="fa-solid fa-medal text-4xl text-yellow-600"></i>
            </div>
            <h1 class="text-2xl font-bold text-stone-800 mb-2">Gestão de Gratificações</h1>
            <p class="text-stone-500 mb-8 text-sm">Controle financeiro e de indicadores.</p>
            
            <button id="btn-login-google" class="w-full bg-white border border-stone-300 hover:bg-stone-50 text-stone-700 font-bold py-3.5 px-4 rounded-xl shadow-sm transition-colors flex items-center justify-center space-x-3 mb-4">
                <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-6 h-6" alt="Google">
                <span>Aceder com Google</span>
            </button>

            <button id="btn-login-anon" class="text-stone-400 hover:text-yellow-600 text-xs font-bold underline transition-colors">
                Aceder como Visitante (Modo Teste)
            </button>
        </div>
    </div>

    <!-- Layout Principal - Expandido para Modo Paisagem (max-w-7xl) -->
    <div id="app-layout" class="hidden max-w-7xl w-full mx-auto min-h-screen bg-stone-100 flex-col text-stone-900 shadow-2xl relative">
        <main class="flex-1 w-full" id="app-container">
            <!-- Conteúdo Dinâmico -->
        </main>
    </div>

    <!-- Modais -->
    <div id="modals" class="no-print"></div>

    <!-- Lógica da Aplicação Integrada -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged, GoogleAuthProvider, signInWithPopup, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, query, onSnapshot, doc, setDoc, deleteDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Estado Global
        const state = {
            view: 'dashboard',
            reportTab: 'fechamento', 
            logTab: 'novo',
            user: null,
            settings: { logo: '' },
            employees: [],
            sectors: [],
            logs: [],
            prorations: [],
            hygieneChecks: [],
            rules: []
        };

        let db, auth, appId, unsubscribeFuncs = [];

        // Configuração Inicial do Firebase
        const initFirebase = async () => {
            try {
                const defaultFirebaseConfig = {
                    apiKey: "AIzaSyAACkZnNeizzXIfH0cS1WZWCITD0scqpJY",
                    authDomain: "gratificacao-2e6e8.firebaseapp.com",
                    projectId: "gratificacao-2e6e8",
                    storageBucket: "gratificacao-2e6e8.firebasestorage.app",
                    messagingSenderId: "843644337269",
                    appId: "1:843644337269:web:36c4bfb09a19f9f0a44c3c",
                    measurementId: "G-66CCNYZEN0"
                };

                const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : defaultFirebaseConfig;
                appId = typeof __app_id !== 'undefined' ? __app_id : 'gestao-grat-app';
                
                const firebaseApp = initializeApp(firebaseConfig);
                auth = getAuth(firebaseApp);
                db = getFirestore(firebaseApp);

                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                }

                onAuthStateChanged(auth, (user) => {
                    const loader = document.getElementById('loading-overlay');
                    const loginScreen = document.getElementById('login-screen');
                    const appLayout = document.getElementById('app-layout');

                    loader.classList.add('hidden');

                    if (user) {
                        state.user = user;
                        loginScreen.classList.add('hidden');
                        loginScreen.classList.remove('flex');
                        appLayout.classList.remove('hidden');
                        appLayout.classList.add('flex');
                        setupListeners();
                    } else {
                        state.user = null;
                        appLayout.classList.add('hidden');
                        appLayout.classList.remove('flex');
                        loginScreen.classList.remove('hidden');
                        loginScreen.classList.add('flex');
                    }
                });

            } catch (error) {
                console.error("Firebase init error:", error);
                document.getElementById('loading-overlay').classList.add('hidden');
                alert("Erro crítico ao inicializar o Firebase. Verifique a configuração.");
            }
        };

        const setupListeners = () => {
            unsubscribeFuncs.forEach(unsub => unsub());
            const publicPath = `artifacts/${appId}/public/data`;
            
            unsubscribeFuncs.push(onSnapshot(doc(db, `${publicPath}/settings`, 'main'), (docSnap) => {
                if (docSnap.exists()) state.settings = docSnap.data();
                if(state.view === 'configuracoes' || state.view === 'relatorios') window.app.render();
            }, (e) => console.error(e)));

            unsubscribeFuncs.push(onSnapshot(query(collection(db, `${publicPath}/employees`)), (snap) => {
                state.employees = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                if(state.view === 'colaboradores' || state.view === 'lancamentos' || state.view === 'higiene') window.app.render();
            }, (e) => console.error(e)));

            unsubscribeFuncs.push(onSnapshot(query(collection(db, `${publicPath}/sectors`)), (snap) => {
                state.sectors = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                if(state.sectors.length === 0) window.app.populateInitialSectors();
                if(state.view === 'setores' || state.view === 'colaboradores' || state.view === 'lancamentos') window.app.render();
            }, (e) => console.error(e)));

            unsubscribeFuncs.push(onSnapshot(query(collection(db, `${publicPath}/rules`)), (snap) => {
                state.rules = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                if(state.rules.length === 0) window.app.populateInitialRules();
                if(state.view === 'setores' || state.view === 'lancamentos' || state.view === 'relatorios' || state.view === 'dashboard') window.app.render();
            }, (e) => console.error(e)));

            unsubscribeFuncs.push(onSnapshot(query(collection(db, `${publicPath}/logs`)), (snap) => {
                state.logs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                if(state.view === 'lancamentos' || state.view === 'relatorios' || state.view === 'dashboard') window.app.render();
            }, (e) => console.error(e)));

            unsubscribeFuncs.push(onSnapshot(query(collection(db, `${publicPath}/prorations`)), (snap) => {
                state.prorations = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                if(state.view === 'proporcionais' || state.view === 'relatorios') window.app.render();
            }, (e) => console.error(e)));

            unsubscribeFuncs.push(onSnapshot(query(collection(db, `${publicPath}/hygiene_checks`)), (snap) => {
                state.hygieneChecks = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                if (state.view === 'higiene' || state.view === 'relatorios' || state.view === 'lancamentos') window.app.render();
            }, (e) => console.error(e)));
        };

        window.app = {
            generateId: () => {
                return typeof crypto !== 'undefined' && typeof crypto.randomUUID === 'function' 
                    ? crypto.randomUUID() 
                    : Date.now().toString(36) + Math.random().toString(36).substring(2);
            },
            
            getMonthId: (dateObj) => {
                 return `${dateObj.getFullYear()}-${String(dateObj.getMonth() + 1).padStart(2, '0')}`;
            },

            formatBRL: (val) => Number(val).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' }),
            formatPct: (val) => (Number(val) * 100).toFixed(2) + '%',

            toast: (msg, type = 'info') => {
                const colors = { success: 'bg-green-600', error: 'bg-red-600', info: 'bg-stone-600' };
                const icon = { success: 'fa-check', error: 'fa-triangle-exclamation', info: 'fa-info-circle' };
                const div = document.createElement('div');
                div.className = `fixed top-4 right-4 ${colors[type]} text-white px-4 py-3 rounded-lg shadow-xl font-bold flex items-center space-x-2 z-50 animate-fade-in`;
                div.innerHTML = `<i class="fa-solid ${icon[type]}"></i><span>${msg}</span>`;
                document.body.appendChild(div);
                setTimeout(() => div.remove(), 3000);
            },

            openModal: (html) => {
                document.getElementById('modals').innerHTML = `
                    <div class="fixed inset-0 z-50 flex items-center justify-center p-4 modal-overlay">
                        <div class="bg-white rounded-xl shadow-2xl w-full max-w-md overflow-hidden animate-fade-in text-stone-900">
                            ${html}
                        </div>
                    </div>
                `;
            },

            closeModal: () => {
                document.getElementById('modals').innerHTML = '';
            },

            confirmAction: (msg, actionStr, dataId = '') => {
                window.app.openModal(`
                    <div class="p-6 text-center">
                        <i class="fa-solid fa-circle-exclamation text-4xl text-yellow-500 mb-4"></i>
                        <p class="text-stone-800 font-bold mb-6">${msg}</p>
                        <div class="flex gap-2 pt-2">
                            <button data-action="closeModal" class="flex-1 py-3 border border-stone-300 rounded-lg font-bold text-stone-600 hover:bg-stone-50">Cancelar</button>
                            <button data-action="${actionStr}" data-id="${dataId}" class="flex-1 py-3 bg-red-600 text-white rounded-lg font-bold hover:bg-red-700">Confirmar</button>
                        </div>
                    </div>
                `);
            },

            loginWithGoogle: async () => {
                const provider = new GoogleAuthProvider();
                try {
                    await signInWithPopup(auth, provider);
                    window.app.toast("Login com sucesso!", "success");
                } catch (error) {
                    window.app.toast("Falha na autenticação.", "error");
                }
            },

            loginAnonymously: async () => {
                try {
                    window.app.toast("Entrando no modo teste...", "info");
                    await signInAnonymously(auth);
                } catch (error) {
                    window.app.toast("Falha na autenticação anônima.", "error");
                }
            },

            logout: async () => {
                try {
                    await signOut(auth);
                    window.location.reload();
                } catch (error) {
                    window.app.toast("Erro ao desconectar.", "error");
                }
            },

            populateInitialSectors: async () => {
                const initial = [
                    { id: 'salgado', name: 'Salgado', val_liderado: 180, val_lider: 250 },
                    { id: 'ped', name: 'P&D', val_liderado: 180, val_lider: 250 }
                ];
                for (let sec of initial) await setDoc(doc(db, `artifacts/${appId}/public/data/sectors`, sec.id), sec);
            },
            
            populateInitialRules: async () => {
                const initialRules = [
                    { id: 'produtividade', name: 'Produtividade', pct: 0.20, max: 1 },
                    { id: 'higiene', name: 'Higiene Pessoal (Inadequada)', pct: 0.0333, max: 3 }
                ];
                for (let r of initialRules) await setDoc(doc(db, `artifacts/${appId}/public/data/rules`, r.id), r);
            },

            navigate: (view) => {
                state.view = view;
                window.app.render();
                window.scrollTo(0, 0);
            },

            setReportTab: (tab) => { state.reportTab = tab; window.app.render(); },
            setLogTab: (tab) => { state.logTab = tab; window.app.render(); },

            render: () => {
                const container = document.getElementById('app-container');
                if(!container) return;
                
                let content = '';
                switch (state.view) {
                    case 'dashboard': content = window.app.views.dashboard(); break;
                    case 'colaboradores': content = window.app.views.colaboradores(); break;
                    case 'setores': content = window.app.views.setores(); break;
                    case 'lancamentos': content = window.app.views.lancamentos(); break;
                    case 'higiene': content = window.app.views.higiene(); break;
                    case 'proporcionais': content = window.app.views.proporcionais(); break;
                    case 'relatorios': content = window.app.views.relatorios(); break;
                    case 'configuracoes': content = window.app.views.configuracoes(); break;
                }
                
                container.innerHTML = content;

                if (state.view === 'colaboradores') window.app.filterColaboradores();
                if (state.view === 'lancamentos' && state.logTab === 'historico') window.app.renderLogsHistoryList();
            },

            // Modais
            showImportModal: () => {
                window.app.openModal(`
                    <div class="p-4 border-b border-stone-200">
                        <h2 class="text-lg font-bold text-yellow-600">Importar Planilha</h2>
                    </div>
                    <div class="p-6 space-y-4">
                        <div class="bg-yellow-50 border border-yellow-200 p-3 rounded text-xs text-yellow-800">
                            <strong>Colunas necessárias:</strong> Nome, Setor, Função/Cargo (Líder/Liderado), Valor Base.
                        </div>
                        <label class="flex flex-col items-center justify-center w-full h-32 border-2 border-dashed border-stone-300 rounded-xl cursor-pointer hover:bg-stone-50 transition-colors">
                            <i class="fa-solid fa-upload text-2xl text-stone-400 mb-2"></i>
                            <span class="text-sm font-bold text-stone-600">Selecionar Ficheiro (.xlsx)</span>
                            <input id="dropzone-file" type="file" class="hidden" accept=".csv, .xlsx" />
                        </label>
                        <button data-action="closeModal" class="w-full py-3 mt-2 border border-stone-300 rounded-lg font-bold text-stone-600">Cancelar</button>
                    </div>
                `);
            },
            
            showEmployeeForm: (id = null) => {
                const emp = id && id !== 'null' ? state.employees.find(e => e.id === id) : {};
                const sectorOpts = state.sectors.map(s => `<option value="${s.id}" ${emp.sectorId === s.id ? 'selected' : ''}>${s.name}</option>`).join('');
                window.app.openModal(`
                    <div class="p-4 border-b border-stone-200">
                        <h2 class="text-lg font-bold text-yellow-600">${emp.id ? 'Editar' : 'Novo'} Colaborador</h2>
                    </div>
                    <form id="form-employee" class="p-6 space-y-4">
                        <input type="hidden" id="emp_id" value="${emp.id || ''}">
                        <div>
                            <label class="block text-xs font-bold text-stone-500 uppercase mb-1">Nome Completo</label>
                            <input type="text" id="emp_name" value="${emp.name || ''}" required class="w-full p-3 bg-stone-50 border border-stone-300 rounded-lg outline-none focus:border-yellow-500 text-sm">
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-xs font-bold text-stone-500 uppercase mb-1">Setor</label>
                                <select id="emp_sector" required class="w-full p-3 bg-stone-50 border border-stone-300 rounded-lg outline-none focus:border-yellow-500 text-sm">
                                    <option value="">Selecione...</option>${sectorOpts}
                                </select>
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-stone-500 uppercase mb-1">Perfil</label>
                                <select id="emp_role" required class="w-full p-3 bg-stone-50 border border-stone-300 rounded-lg outline-none focus:border-yellow-500 text-sm">
                                    <option value="liderado" ${emp.role === 'liderado' ? 'selected' : ''}>Liderado</option>
                                    <option value="lider" ${emp.role === 'lider' ? 'selected' : ''}>Líder</option>
                                </select>
                            </div>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-stone-500 uppercase mb-1">Valor Personalizado (R$)</label>
                            <input type="number" step="0.01" id="emp_custom_val" value="${emp.customBaseValue || ''}" placeholder="Vazio = Setor" class="w-full p-3 bg-stone-50 border border-stone-300 rounded-lg outline-none focus:border-yellow-500 text-sm">
                        </div>
                        <div class="flex gap-2 pt-2">
                            <button type="button" data-action="closeModal" class="flex-1 py-3 border border-stone-300 rounded-lg font-bold text-stone-600">Cancelar</button>
                            <button type="submit" class="flex-1 py-3 bg-yellow-500 text-white rounded-lg font-bold hover:bg-yellow-600">Salvar</button>
                        </div>
                    </form>
                `);
            },
            
            showSectorForm: (id = null) => {
                const sec = id && id !== 'null' ? state.sectors.find(s => s.id === id) : {};
                window.app.openModal(`
                    <div class="p-4 border-b border-stone-200">
                        <h2 class="text-lg font-bold text-yellow-600">${sec.id ? 'Editar' : 'Novo'} Setor</h2>
                    </div>
                    <form id="form-sector" class="p-6 space-y-4">
                        <input type="hidden" id="sec_id" value="${sec.id || ''}">
                        <div>
                            <label class="block text-xs font-bold text-stone-500 uppercase mb-1">Nome</label>
                            <input type="text" id="sec_name" value="${sec.name || ''}" required class="w-full p-3 bg-stone-50 border border-stone-300 rounded-lg outline-none focus:border-yellow-500 text-sm">
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="block text-xs font-bold text-stone-500 uppercase mb-1">Val. Liderado</label>
                                <input type="number" step="0.01" id="sec_val_liderado" value="${sec.val_liderado || ''}" required class="w-full p-3 bg-stone-50 border border-stone-300 rounded-lg outline-none focus:border-yellow-500 text-sm">
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-stone-500 uppercase mb-1">Val. Líder</label>
                                <input type="number" step="0.01" id="sec_val_lider" value="${sec.val_lider || ''}" required class="w-full p-3 bg-stone-50 border border-stone-300 rounded-lg outline-none focus:border-yellow-500 text-sm">
                            </div>
                        </div>
                        <div class="flex gap-2 pt-2">
                            <button type="button" data-action="closeModal" class="flex-1 py-3 border border-stone-300 rounded-lg font-bold text-stone-600">Cancelar</button>
                            <button type="submit" class="flex-1 py-3 bg-yellow-500 text-white rounded-lg font-bold hover:bg-yellow-600">Salvar</button>
                        </div>
                    </form>
                `);
            },
            
            showRuleForm: (id = null) => {
                const rule = id && id !== 'null' ? state.rules.find(r => r.id === id) : {};
                const pctVal = rule.pct !== undefined ? (rule.pct * 100).toFixed(2) : '';
                window.app.openModal(`
                    <div class="p-4 border-b border-stone-200">
                        <h2 class="text-lg font-bold text-yellow-600">${rule.id ? 'Editar' : 'Nova'} Regra</h2>
                    </div>
                    <form id="form-rule" class="p-6 space-y-4">
                        <input type="hidden" id="rule_id" value="${rule.id || ''}">
                        <div>
                            <label class="block text-xs font-bold text-stone-500 uppercase mb-1">Critério</label>
                            <input type="text" id="rule_name" value="${rule.name || ''}" required class="w-full p-3 bg-stone-50 border border-stone-300 rounded-lg outline-none focus:border-yellow-500 text-sm">
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="block text-xs font-bold text-stone-500 uppercase mb-1">% Desconto</label>
                                <input type="number" step="0.01" id="rule_pct" value="${pctVal}" required class="w-full p-3 bg-stone-50 border border-stone-300 rounded-lg outline-none focus:border-yellow-500 text-sm">
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-stone-500 uppercase mb-1">Máx Acúmulo</label>
                                <input type="number" step="1" min="1" id="rule_max" value="${rule.max || 1}" required class="w-full p-3 bg-stone-50 border border-stone-300 rounded-lg outline-none focus:border-yellow-500 text-sm">
                            </div>
                        </div>
                        <div class="flex gap-2 pt-2">
                            <button type="button" data-action="closeModal" class="flex-1 py-3 border border-stone-300 rounded-lg font-bold text-stone-600">Cancelar</button>
                            <button type="submit" class="flex-1 py-3 bg-yellow-500 text-white rounded-lg font-bold hover:bg-yellow-600">Salvar</button>
                        </div>
                    </form>
                `);
            },
            
            showProrationForm: () => {
                const empOpts = state.employees.map(e => `<option value="${e.id}">${e.name}</option>`).join('');
                const currentMonth = window.app.getMonthId(new Date());
                window.app.openModal(`
                    <div class="p-4 border-b border-stone-200">
                        <h2 class="text-lg font-bold text-yellow-600">Férias / Admissão</h2>
                    </div>
                    <form id="form-proration" class="p-6 space-y-4">
                        <div>

            },
            
            filterColaboradores: () => {
                const term = (document.getElementById('search_colab')?.value || '').toLowerCase();
                const sortType = document.getElementById('sort_colab')?.value || 'name_asc';
                
                let filtered = state.employees.filter(e => e.name.toLowerCase().includes(term));
                filtered.sort((a,b) => {
                    if (sortType === 'name_asc') return a.name.localeCompare(b.name);
                    if (sortType === 'name_desc') return b.name.localeCompare(a.name);
                    if (sortType === 'sec_asc') {
                        const secA = state.sectors.find(s => s.id === a.sectorId)?.name || 'Z';
                        const secB = state.sectors.find(s => s.id === b.sectorId)?.name || 'Z';
                        return secA.localeCompare(secB) || a.name.localeCompare(b.name);
                    }
                    return 0;
                });

                const container = document.getElementById('colab_list');
                if(!container) return;

                const items = filtered.map(emp => {
                    const sec = state.sectors.find(s => s.id === emp.sectorId);
                    const roleName = emp.role === 'lider' ? '<span class="text-[10px] bg-stone-200 px-2 py-0.5 rounded border border-stone-300 font-bold uppercase">Líder</span>' : '<span class="text-[10px] bg-stone-100 text-stone-500 px-2 py-0.5 rounded font-bold uppercase">Liderado</span>';
                    let baseVal = emp.customBaseValue ? emp.customBaseValue : (sec ? (emp.role === 'lider' ? sec.val_lider : sec.val_liderado) : 0);
                    const valDisplay = emp.customBaseValue 
                        ? `<span class="text-green-600 font-bold text-sm">${window.app.formatBRL(baseVal)} *</span>` 
                        : `<span class="text-stone-700 font-bold text-sm">${window.app.formatBRL(baseVal)}</span>`;

                    return `
                        <div class="bg-white p-4 rounded-xl shadow-sm border border-stone-200 flex justify-between items-center animate-fade-in">
                            <div>
                                <p class="font-bold text-stone-800 leading-tight">${emp.name}</p>
                                <div class="flex items-center gap-2 mt-1">
                                    <span class="text-xs text-stone-500">${sec ? sec.name : 'N/A'}</span>
                                    ${roleName}
                                </div>
                            </div>
                            <div class="text-right flex flex-col items-end gap-2">
                                ${valDisplay}
                                <div class="flex gap-2">
                                    <button data-action="showEmployeeForm" data-id="${emp.id}" class="p-1.5 bg-stone-100 rounded text-stone-500 hover:text-yellow-600"><i class="fa-solid fa-pen"></i></button>
                                    <button data-action="deleteEmployee" data-id="${emp.id}" class="p-1.5 bg-stone-100 rounded text-red-500 hover:text-red-700"><i class="fa-solid fa-trash"></i></button>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
                container.innerHTML = items || '<div class="text-center p-6 text-stone-500">Nenhum encontrado.</div>';
            },

            filterLogEmp: (term) => {
                term = term.toLowerCase();
                const select = document.getElementById('log_emp');
                if(!select) return;
                Array.from(select.options).forEach(opt => {
                    if (opt.value === "") return;
                    if (opt.text.toLowerCase().includes(term)) opt.style.display = ''; 
                    else opt.style.display = 'none';
                });
            },

            filterHigiene: (term) => {
                term = term.toLowerCase();
                document.querySelectorAll('.sector-group').forEach(group => {
                    let hasVisible = false;
                    group.querySelectorAll('.higiene-emp-row').forEach(row => {
                        if (row.dataset.name.includes(term)) { row.style.display = 'flex'; hasVisible = true; } 
                        else { row.style.display = 'none'; }
                    });
                    group.style.display = hasVisible ? 'block' : 'none';
                });
            },

            renderLogsHistoryList: () => {
                const month = document.getElementById('hist_month')?.value || window.app.getMonthId(new Date());
                const sectorId = document.getElementById('hist_sec')?.value || '';
                
                let filteredLogs = state.logs.filter(l => l.monthId === month);
                let filteredHygiene = state.hygieneChecks.filter(h => (h.monthId || window.app.getMonthId(new Date(h.date + 'T12:00:00'))) === month);
                
                if (sectorId) {
                    const empsInSec = state.employees.filter(e => e.sectorId === sectorId).map(e => e.id);
                    filteredLogs = filteredLogs.filter(l => empsInSec.includes(l.employeeId));
                    filteredHygiene = filteredHygiene.filter(h => empsInSec.includes(h.employeeId));
                }

                const hygieneAsLogs = filteredHygiene.map(h => ({
                    id: h.id, employeeId: h.employeeId, date: h.date, ruleId: 'higiene', obs: h.obs, timestamp: h.timestamp, isHygiene: true
                }));

                const allRecords = [...filteredLogs, ...hygieneAsLogs].sort((a,b) => b.timestamp - a.timestamp);
                const container = document.getElementById('log_history_container');
                if (!container) return;

                // Definindo as classes do grid aqui também
                container.className = "grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 pb-8";

                if (allRecords.length === 0) {
                    container.innerHTML = '<div class="p-6 text-center text-stone-500 bg-white rounded-xl border border-stone-200 shadow-sm col-span-full">Nenhum registo encontrado.</div>';
                    return;
                }

                container.innerHTML = allRecords.map(log => {
                    const emp = state.employees.find(e => e.id === log.employeeId);
                    const sec = state.sectors.find(s => s.id === emp?.sectorId);
                    const rule = state.rules.find(r => r.id === log.ruleId);
                    const dateStr = log.date ? log.date.split('-').reverse().join('/') : '--';
                    const obsSnippet = log.obs ? `<div class="text-xs text-stone-600 bg-stone-50 p-2 rounded border border-stone-200 mt-2 italic">Obs: ${log.obs}</div>` : '';
                    const deleteAction = log.isHygiene ? 'deleteHygieneRecord' : 'deleteLog';
                    
                    // Identifica se foi uma ação de zerar gratificação
                    const ruleName = log.ruleId === 'zerar_gratificacao' ? 'Zerado (100%)' : (rule ? rule.name : (log.isHygiene ? 'Higiene' : 'Infração'));

                    return `
                        <div class="bg-white p-4 rounded-xl border border-stone-200 shadow-sm animate-fade-in relative flex flex-col justify-between">
                            <button data-action="${deleteAction}" data-id="${log.id}" class="absolute top-4 right-4 text-red-500 bg-stone-100 p-2 rounded hover:bg-red-50 transition-colors"><i class="fa-solid fa-trash"></i></button>
                            <div class="pr-10">
                                <span class="text-[10px] font-bold text-stone-400 uppercase"><i class="fa-solid fa-calendar mr-1"></i> ${dateStr}</span>
                                <h4 class="font-bold text-stone-800 text-sm mt-1">${emp ? emp.name : 'Desconhecido'}</h4>
                                <div class="flex items-center gap-2 mt-1 flex-wrap">
                                    <span class="text-[10px] bg-stone-100 border px-1.5 rounded text-stone-500">${sec ? sec.name : 'Geral'}</span>
                                    <span class="text-xs font-bold text-red-600">${ruleName}</span>
                                </div>
                                ${obsSnippet}
                            </div>
                        </div>
                    `;
                }).join('');
            },

            // VIEWS (Estilo Paisagem / Responsivo Wide)
            views: {
                dashboard: () => {
                    const monthId = window.app.getMonthId(new Date());
                    let totalPay = 0, totalErrors = 0;
                    
                    if (window.app.calculateMonthlyReport) {
                        const report = window.app.calculateMonthlyReport(monthId);
                        totalPay = report.reduce((sum, r) => sum + r.finalValue, 0);
                        totalErrors = state.logs.filter(l => l.monthId === monthId).length +

                    }

                    return `

                                    <p class="text-stone-800 text-sm font-medium">Gestão Financeira e Indicadores</p>
                                </div>
                                <div class="bg-white/90 backdrop-blur-md p-4 rounded-xl border border-yellow-200 shadow-sm flex gap-8 items-center w-full md:w-auto">
                                    <div>
                                        <p class="text-stone-600 text-xs font-bold uppercase">Previsão ${monthId}</p>
                                        <p class="text-xl font-black text-yellow-600">${window.app.formatBRL(totalPay)}</p>
                                    </div>
                                    <div class="text-right border-l pl-8 border-stone-200">
                                        <p class="text-stone-600 text-xs font-bold uppercase">Ocorrências</p>
                                        <p class="text-xl font-black text-red-600">${totalErrors}</p>
                                    </div>
                                </div>
                            </div>
                        </header>
                        
                        <main class="px-6 pb-8 animate-fade-in">
                            <h3 class="text-sm font-bold text-stone-500 uppercase mb-4 ml-1">Módulos do Sistema</h3>
                            
                            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                                <button data-nav="colaboradores" class="w-full p-4 rounded-xl flex items-center justify-between bg-white border border-stone-200 shadow-sm hover:border-yellow-500 active:scale-95 transition-all">
                                    <div class="flex items-center gap-4">
                                        <div class="h-10 w-10 rounded-full bg-stone-100 text-stone-500 flex items-center justify-center text-lg"><i class="fa-solid fa-users"></i></div>
                                        <div class="text-left"><p class="font-bold text-stone-800">Colaboradores</p><p class="text-xs text-stone-500">${state.employees.length} cadastrados</p></div>
                                    </div>
                                    <span class="text-stone-400"><i class="fa-solid fa-chevron-right"></i></span>
                                </button>

                                <button data-nav="setores" class="w-full p-4 rounded-xl flex items-center justify-between bg-white border border-stone-200 shadow-sm hover:border-yellow-500 active:scale-95 transition-all">
                                    <div class="flex items-center gap-4">
                                        <div class="h-10 w-10 rounded-full bg-stone-100 text-stone-500 flex items-center justify-center text-lg"><i class="fa-solid fa-sitemap"></i></div>
                                        <div class="text-left"><p class="font-bold text-stone-800">Setores e Regras</p><p class="text-xs text-stone-500">Valores e Critérios</p></div>
                                    </div>
                                    <span class="text-stone-400"><i class="fa-solid fa-chevron-right"></i></span>
                                </button>

                                    </div>

                                    <div class="flex items-center gap-4">
                                        <div class="h-10 w-10 rounded-full bg-stone-100 text-stone-500 flex items-center justify-center text-lg"><i class="fa-solid fa-calendar-day"></i></div>
                                        <div class="text-left"><p class="font-bold text-stone-800">Férias / Admissões</p><p class="text-xs text-stone-500">Cálculo proporcional</p></div>
                                    </div>
                                    <span class="text-stone-400"><i class="fa-solid fa-chevron-right"></i></span>
                                </button>

                                <button data-nav="relatorios" class="w-full p-4 rounded-xl flex items-center justify-between bg-yellow-50 border border-yellow-200 shadow-sm hover:border-yellow-500 active:scale-95 transition-all">
                                    <div class="flex items-center gap-4">
                                        <div class="h-10 w-10 rounded-full bg-yellow-100 text-yellow-600 flex items-center justify-center text-lg"><i class="fa-solid fa-file-invoice-dollar"></i></div>
                                        <div class="text-left"><p class="font-bold text-yellow-800">Relatórios de Fecho</p><p class="text-xs text-yellow-600">Exportar PDFs para RH</p></div>
                                    </div>
                                    <span class="text-yellow-500"><i class="fa-solid fa-chevron-right"></i></span>
                                </button>
                                
                                <button data-nav="configuracoes" class="w-full p-4 rounded-xl flex items-center justify-between bg-stone-200/50 border border-stone-200 shadow-sm active:scale-95 transition-all lg:col-span-3">
                                    <div class="flex items-center gap-4">

                                    <span class="text-stone-400"><i class="fa-solid fa-chevron-right"></i></span>

                colaboradores: () => {
                    return `
                        <div class="flex items-center gap-3 mb-6">

                                <i class="fa-solid fa-arrow-left text-xl"></i>
                            </button>
                            <h2 class="font-black text-stone-800 text-xl m-0">Colaboradores</h2>
                        </div>
                        <div class="flex flex-col md:flex-row gap-4 mb-6">
                            <div class="relative flex-1">
                                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-stone-400"><i class="fa-solid fa-search"></i></div>
                                <input type="text" id="search_colab" placeholder="Buscar..." class="w-full pl-10 p-3 bg-white border border-stone-300 rounded-xl text-stone-800 outline-none focus:border-yellow-500 text-sm">
                            </div>
                            <select id="sort_colab" class="p-3 bg-white border border-stone-300 rounded-xl outline-none focus:border-yellow-500 text-sm text-stone-600 w-full md:w-48">
                                <option value="name_asc">A-Z</option>
                                <option value="sec_asc">Agrupar por Setor</option>
                            </select>
                            <div class="flex gap-2 w-full md:w-auto">
                                <button data-action="showImportModal" class="flex-1 md:flex-none px-6 py-3 border border-stone-300 bg-white rounded-xl text-stone-600 font-bold text-sm shadow-sm flex justify-center items-center gap-2 hover:bg-stone-50"><i class="fa-solid fa-file-excel"></i> Importar</button>
                                <button data-action="showEmployeeForm" class="flex-1 md:flex-none px-6 py-3 bg-yellow-500 text-white rounded-xl font-bold text-sm shadow-sm flex justify-center items-center gap-2 hover:bg-yellow-600"><i class="fa-solid fa-plus"></i> Novo</button>
                            </div>
                        </div>

                        <div id="colab_list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
                    `;
                },
                setores: () => {
                    const secList = state.sectors.sort((a,b)=>a.name.localeCompare(b.name)).map(sec => `
                        <div class="bg-white p-4 rounded-xl shadow-sm border border-stone-200 flex justify-between items-center">
                            <div>
                                <p class="font-bold text-stone-800">${sec.name}</p>
                                <p class="text-[10px] text-stone-500 uppercase font-bold mt-1">Liderado: <span class="text-stone-700">${window.app.formatBRL(sec.val_liderado)}</span> | Líder: <span class="text-stone-700">${window.app.formatBRL(sec.val_lider)}</span></p>
                            </div>
                            <div class="flex gap-2">
                                <button data-action="showSectorForm" data-id="${sec.id}" class="p-1.5 bg-stone-100 rounded text-stone-500 hover:text-yellow-600"><i class="fa-solid fa-pen"></i></button>
                                <button data-action="deleteSector" data-id="${sec.id}" class="p-1.5 bg-stone-100 rounded text-red-500 hover:text-red-700"><i class="fa-solid fa-trash"></i></button>
                            </div>
                        </div>
                    `).join('');
                    
                    const ruleList = state.rules.map(rule => `
                        <div class="bg-white p-4 rounded-xl shadow-sm border border-stone-200 flex justify-between items-center">
                            <div class="flex-1 pr-2">
                                <p class="font-bold text-stone-800 text-sm leading-tight">${rule.name}</p>
                                <div class="flex gap-2 mt-2">
                                    <span class="text-[10px] bg-red-100 text-red-700 px-1.5 rounded font-bold border border-red-200">-${window.app.formatPct(rule.pct)}</span>

                                ${rule.id !== 'higiene' ? `<button data-action="deleteRule" data-id="${rule.id}" class="p-1.5 bg-stone-100 rounded text-red-500 hover:text-red-700 text-xs text-center"><i class="fa-solid fa-trash"></i></button>` : ''}
                            </div>
                        </div>
                    `).join('');

                    return `
                        <div class="flex items-center gap-3 mb-6">
                            <button data-nav="dashboard" class="text-stone-400 hover:text-stone-800 transition-colors" title="Voltar ao Painel">

                            </button>

                                    <button data-action="showSectorForm" class="text-xs bg-stone-200 text-stone-700 px-4 py-2 rounded font-bold hover:bg-stone-300">Novo Setor</button>
                                </div>
                                <div class="grid gap-3">${secList || '<p class="text-center text-stone-400 py-4 text-sm">Nenhum setor.</p>'}</div>
                            </div>
                            
                            <div>
                                <div class="flex justify-between items-center mb-4">

                                    <button data-action="showRuleForm" class="text-xs bg-stone-200 text-stone-700 px-4 py-2 rounded font-bold hover:bg-stone-300">Nova Regra</button>

                                <div class="grid gap-3">${ruleList || '<p class="text-center text-stone-400 py-4 text-sm">Nenhuma regra.</p>'}</div>
                            </div>
                        </div>
                    `;
                },
                lancamentos: () => {
                    const activeTab = state.logTab || 'novo';
                    
                    let content = '';
                    if (activeTab === 'historico') {
                        const monthOpts = [...new Set([...state.logs, ...state.hygieneChecks].map(l => l.monthId||window.app.getMonthId(new Date(l.date+'T12:00:00')))), window.app.getMonthId(new Date())].sort().reverse().map(m => `<option value="${m}">${m}</option>`).join('');
                        const sectorOpts = state.sectors.sort((a,b)=>a.name.localeCompare(b.name)).map(s => `<option value="${s.id}">${s.name}</option>`).join('');

                        content = `
                            <div class="bg-white p-4 rounded-xl shadow-sm border border-stone-200 mb-6 animate-fade-in">
                                <h3 class="text-xs font-bold text-stone-500 uppercase mb-3"><i class="fa-solid fa-search"></i> Filtros de Pesquisa</h3>
