                                </div>
                                
                                <select id="filter_sector_higiene" class="p-3 bg-white border border-stone-300 rounded-xl text-sm outline-none focus:border-yellow-500 shadow-sm w-full md:w-48 text-stone-600">
                                    <option value="">Todos os Setores</option>
                                    ${sectorOpts}
                                </select>

                                <div class="relative w-full md:flex-1">
                                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-stone-400"><i class="fa-solid fa-search"></i></div>
                                    <input type="text" id="search_higiene" placeholder="Procurar colaborador..." class="w-full pl-10 p-3 bg-white border border-stone-300 rounded-xl text-sm outline-none focus:border-yellow-500 shadow-sm">
                                </div>
                            </div>

                            <div id="higiene_list">${sectorsHtml||'<p class="text-center text-stone-500">Nenhum colaborador.</p>'}</div>
                        </div>
                    `;
                },
                proporcionais: () => {
                    const currentMonthId = window.app.getMonthId(new Date());
                    const list = state.prorations.filter(p => p.monthId === currentMonthId).map(p => {
                        const emp = state.employees.find(e => e.id === p.employeeId);
                        return `<div class="bg-white p-5 rounded-xl shadow-sm border border-stone-200 flex justify-between items-center animate-fade-in"><div><p class="font-bold text-stone-800 text-base">${emp?(emp.name||'Colab. sem nome'):'Colab. Excluído'}</p><p class="text-sm text-stone-500 uppercase mt-1">Trabalhou: <strong class="text-yellow-600">${p.daysWorked}</strong> de ${p.totalDays} dias</p></div><button data-action="confirmDeleteProration" data-id="${p.id}" class="p-3 bg-stone-100 rounded-lg text-red-500 hover:bg-red-50 hover:text-red-700 transition-colors"><i class="fa-solid fa-trash"></i></button></div>`;
                    }).join('');

                    return `
                        <div class="flex items-center gap-3 mb-6">
                            <button data-nav="dashboard" class="text-stone-400 hover:text-stone-800 transition-colors" title="Voltar ao Painel">
                                <i class="fa-solid fa-arrow-left text-xl"></i>
                            </button>
                            <h2 class="font-black text-stone-800 text-xl m-0">Férias e Admissões</h2>
                        </div>
                        <div class="max-w-4xl mx-auto">
                            <button data-action="showProrationForm" class="w-full py-4 mb-8 bg-yellow-500 text-white rounded-xl font-bold shadow-lg shadow-yellow-500/20 hover:bg-yellow-600 flex justify-center items-center gap-2 text-lg">
                                <i class="fa-solid fa-plus"></i> Novo Registo Proporcional
                            </button>
                            
                            <h3 class="text-sm font-bold text-stone-500 uppercase mb-4 ml-1 border-b border-stone-300 pb-2"><i class="fa-solid fa-calendar-day mr-2"></i> Registos do Mês (${currentMonthId})</h3>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                ${list||'<div class="p-8 text-center text-stone-400 bg-stone-50 rounded-xl border border-stone-200 border-dashed text-sm col-span-full">Nenhum registo neste mês.</div>'}
                            </div>
                        </div>
                    `;
                },
                relatorios: () => {
                    // Mesma lógica de cálculo mantida intacta
                    window.app.calculateMonthlyReport = (monthId) => {
                        const report = [];
                        state.employees.forEach(emp => {
                            const sector = state.sectors.find(s => s.id === emp.sectorId);
                            if(!sector) return;
                            let baseValue = emp.role === 'lider' ? sector.val_lider : sector.val_liderado;
                            if (emp.customBaseValue) baseValue = Number(emp.customBaseValue);
                            const proration = state.prorations.find(p => p.employeeId === emp.id && p.monthId === monthId);
                            let validBase = baseValue;
                            let proportionMsg = "Mês Integral";
                            if (proration) {
                                validBase = baseValue * (proration.daysWorked / proration.totalDays);
                                proportionMsg = `${proration.daysWorked}/${proration.totalDays} dias`;
                            }
                            const empLogs = state.logs.filter(l => l.employeeId === emp.id && l.monthId === monthId);
                            const empHygiene = state.hygieneChecks.filter(h => h.employeeId === emp.id && window.app.getSafeMonthId(h) === monthId);
                            
                            let totalDeductionPct = 0;
                            let isZerado = false;
                            const errorCounts = {};
                            
                            empLogs.forEach(log => { 
                                if (log.ruleId === 'zerar_gratificacao') {
                                    isZerado = true;
                                } else {
                                    errorCounts[log.ruleId] = (errorCounts[log.ruleId] || 0) + 1; 
                                }
                            });
                            
                            if (empHygiene.length > 0) errorCounts['higiene'] = empHygiene.length;
                            
                            state.rules.forEach(rule => {
                                const count = errorCounts[rule.id] || 0;
                                totalDeductionPct += (Math.min(count, rule.max) * rule.pct);
                            });
                            
                            if (isZerado) totalDeductionPct = 1;
                            if (totalDeductionPct > 1) totalDeductionPct = 1;
                            
                            const finalValue = validBase - (validBase * totalDeductionPct);
                            report.push({ emp, sectorName: sector.name, baseValue, validBase, proportionMsg, totalDeductionPct, finalValue });
                        });
                        return report.sort((a,b) => (a.sectorName||'').localeCompare(b.sectorName||'') || (a.emp.name||'').localeCompare(b.emp.name||''));
                    };

                    window.app.generateErrorLogsReportHtml = (monthId) => {
                        let html = '';
                        let sectorCount = 0;
                        [...state.sectors].sort((a,b)=>(a.name||'').localeCompare(b.name||'')).forEach(sec => {
                            const emps = state.employees.filter(e => e.sectorId === sec.id).sort((a,b)=>(a.name||'').localeCompare(b.name||''));
                            if(emps.length === 0) return;
                            let sectorLogsHtml = '';
                            emps.forEach(emp => {
                                const allLogs = [...state.logs.filter(l => l.employeeId === emp.id && l.monthId === monthId), ...state.hygieneChecks.filter(h => h.employeeId === emp.id && window.app.getSafeMonthId(h) === monthId).map(h => ({ ...h, ruleId: 'higiene' }))].sort((a,b) => new Date(a.date||0) - new Date(b.date||0));
                                if(allLogs.length === 0) return;
                                const logsList = allLogs.map(l => {
                                    let ruleName = 'Desc.';
                                    let rulePct = 0;
                                    
                                    if (l.ruleId === 'zerar_gratificacao') {
                                        ruleName = 'Zerar Gratificação';
                                        rulePct = 1;
                                    } else if (l.ruleId === 'higiene') {
                                        ruleName = 'Higiene Pessoal';
                                        const hRule = state.rules.find(r => r.id === 'higiene');
                                        rulePct = hRule ? hRule.pct : 0;
                                    } else {
                                        const rule = state.rules.find(r => r.id === l.ruleId);
                                        if (rule) { ruleName = rule.name; rulePct = rule.pct; }
                                    }
                                    
                                    const dateStr = l.date ? l.date.split('-').reverse().join('/') : '--/--/----';
                                    return `<li class="text-sm text-stone-700 ml-2 border-l-2 border-red-400 pl-3 py-1 mb-2"><span class="font-bold text-stone-500 mr-2">${dateStr}</span>${ruleName} <b class="text-red-500">(-${window.app.formatPct(rulePct)})</b>${l.obs?`<br><span class="text-xs italic text-stone-400 mt-1 block">Obs: ${l.obs}</span>`:''}</li>`;
                                }).join('');
                                sectorLogsHtml += `<div class="mb-4 bg-white rounded-lg p-4 border border-stone-200" style="break-inside: avoid;"><p class="font-bold text-stone-800 text-base mb-3">${emp.name || 'Sem nome'}</p><ul>${logsList}</ul></div>`;
                            });
                            
                            if(sectorLogsHtml) {
                                const pageBreakStyle = sectorCount > 0 ? 'page-break-before: always;' : '';
                                html += `<div class="mb-6" style="${pageBreakStyle}"><h3 class="bg-stone-100 text-stone-600 px-4 py-3 rounded-t-lg font-bold text-sm uppercase border border-stone-200 border-b-0">${sec.name}</h3><div class="p-4 border border-stone-200 rounded-b-lg bg-stone-50 grid grid-cols-1 md:grid-cols-2 gap-4">${sectorLogsHtml}</div></div>`;
                                sectorCount++;
                            }
                        });
                        return html || '<div class="p-8 text-center text-stone-400 text-sm border border-dashed border-stone-300 rounded-xl">Sem erros registados.</div>';
                    };

                    window.app.generateComparativeReportHtml = (monthId) => {
                        let [y, m] = monthId.split('-').map(Number);
                        let prevM = m - 1;
                        let prevY = y;
                        if (prevM === 0) { prevM = 12; prevY -= 1; }
                        const prevMonthId = `${prevY}-${String(prevM).padStart(2, '0')}`;

                        // Histórico e Ocorrências
                        const currLogs = state.logs.filter(l => l.monthId === monthId);
                        const currHyg = state.hygieneChecks.filter(h => window.app.getSafeMonthId(h) === monthId);
                        const prevLogs = state.logs.filter(l => l.monthId === prevMonthId);
                        const prevHyg = state.hygieneChecks.filter(h => window.app.getSafeMonthId(h) === prevMonthId);

                        const currTotal = currLogs.length + currHyg.length;
                        const prevTotal = prevLogs.length + prevHyg.length;

                        // Setores que Melhoraram / Pioraram
                        const currSecCounts = {};
                        const prevSecCounts = {};
                        state.sectors.forEach(s => { currSecCounts[s.id] = 0; prevSecCounts[s.id] = 0; });

                        const countSectorLogs = (logs, hyg, countsObj) => {
                            logs.forEach(l => {
                                const emp = state.employees.find(e => e.id === l.employeeId);
                                if(emp && countsObj[emp.sectorId] !== undefined) countsObj[emp.sectorId]++;
                            });
                            hyg.forEach(h => {
                                const emp = state.employees.find(e => e.id === h.employeeId);
                                if(emp && countsObj[emp.sectorId] !== undefined) countsObj[emp.sectorId]++;
                            });
                        };
                        countSectorLogs(currLogs, currHyg, currSecCounts);
                        countSectorLogs(prevLogs, prevHyg, prevSecCounts);

                        const improvedSectors = [];
                        const worsenedSectors = [];
                        state.sectors.forEach(s => {
                            const diff = currSecCounts[s.id] - prevSecCounts[s.id];
                            if (diff < 0) improvedSectors.push({ name: s.name, diff: Math.abs(diff), curr: currSecCounts[s.id], prev: prevSecCounts[s.id] });
                            else if (diff > 0) worsenedSectors.push({ name: s.name, diff, curr: currSecCounts[s.id], prev: prevSecCounts[s.id] });
                        });

                        // Regras Mais e Menos Quebradas no mês ATUAL (Desconsiderando Zerar Gratificação)
                        const ruleCounts = {};
                        state.rules.forEach(r => ruleCounts[r.id] = { name: r.name, count: 0 });
                        
                        currLogs.forEach(l => {
                            if (l.ruleId !== 'zerar_gratificacao' && ruleCounts[l.ruleId]) {
                                ruleCounts[l.ruleId].count++;
                            }
                        });
                        currHyg.forEach(h => {
                            if (ruleCounts['higiene']) ruleCounts['higiene'].count++;
                        });

                        const activeRules = Object.values(ruleCounts).filter(r => r.count > 0).sort((a,b) => b.count - a.count);
                        const mostBroken = activeRules.length > 0 ? activeRules[0] : null;
                        const leastBroken = activeRules.length > 0 ? activeRules[activeRules.length - 1] : null;

                        // Renderização
                        let totalStatusHtml = '';
                        if (currTotal < prevTotal) {
                            totalStatusHtml = `<span class="text-green-600 font-bold"><i class="fa-solid fa-arrow-trend-down"></i> Melhorou (${currTotal} vs ${prevTotal})</span>`;
                        } else if (currTotal > prevTotal) {
                            totalStatusHtml = `<span class="text-red-600 font-bold"><i class="fa-solid fa-arrow-trend-up"></i> Piorou (${currTotal} vs ${prevTotal})</span>`;
                        } else {
                            totalStatusHtml = `<span class="text-stone-500 font-bold"><i class="fa-solid fa-minus"></i> Manteve Estável (${currTotal})</span>`;
                        }

                        const formatSectorList = (list, isImproved) => {
                            if(list.length === 0) return '<p class="text-sm text-stone-500 italic">Nenhum setor registou essa variação.</p>';
                            return list.map(s => `
                                <div class="flex justify-between items-center py-2 border-b border-stone-100 last:border-0">
                                    <span class="text-sm font-bold text-stone-700">${s.name}</span>
                                    <span class="text-xs font-bold px-2 py-1 rounded ${isImproved ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}">
                                        ${isImproved ? '-' : '+'}${s.diff} erro(s) <span class="font-normal opacity-75">(de ${s.prev} para ${s.curr})</span>
                                    </span>
                                </div>
                            `).join('');
                        };

                        return `
                            <div class="bg-stone-50 p-6 rounded-xl border border-stone-200 mb-6">
                                <h3 class="text-lg font-black text-stone-800 mb-4 border-b border-stone-200 pb-2"><i class="fa-solid fa-scale-unbalanced text-yellow-600 mr-2"></i> Evolução Geral (Atual vs Mês Anterior: ${prevMonthId})</h3>
                                <div class="flex items-center justify-between bg-white p-4 rounded-lg shadow-sm border border-stone-200">
                                    <span class="text-stone-600 font-bold text-sm uppercase">Ocorrências Totais:</span>
                                    <span class="text-lg">${totalStatusHtml}</span>
                                </div>
                            </div>

                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                                <div class="bg-white p-5 rounded-xl border border-green-200 shadow-sm" style="break-inside: avoid;">
                                    <h4 class="text-green-700 font-black mb-4 flex items-center gap-2 uppercase text-sm"><i class="fa-solid fa-thumbs-up"></i> Setores que Melhoraram</h4>
                                    ${formatSectorList(improvedSectors, true)}
                                </div>
                                <div class="bg-white p-5 rounded-xl border border-red-200 shadow-sm" style="break-inside: avoid;">
                                    <h4 class="text-red-700 font-black mb-4 flex items-center gap-2 uppercase text-sm"><i class="fa-solid fa-thumbs-down"></i> Setores que Pioraram</h4>
                                    ${formatSectorList(worsenedSectors, false)}
                                </div>
                            </div>

                            <div class="bg-stone-50 p-6 rounded-xl border border-stone-200" style="break-inside: avoid;">
                                <h3 class="text-lg font-black text-stone-800 mb-4 border-b border-stone-200 pb-2"><i class="fa-solid fa-ranking-star text-yellow-600 mr-2"></i> Ranking de Regras Quebradas (Neste Mês)</h3>
                                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                    <div class="bg-white p-4 rounded-lg shadow-sm border border-red-200 flex flex-col items-center justify-center text-center">
                                        <span class="text-[10px] font-bold text-stone-400 uppercase mb-1">A Regra Mais Quebrada</span>
                                        <span class="text-red-600 font-black text-sm">${mostBroken ? mostBroken.name : 'Nenhuma infração registada'}</span>
                                        ${mostBroken ? `<span class="text-xs text-red-500 bg-red-50 px-2 py-1 rounded font-bold mt-2">${mostBroken.count} ocorrência(s)</span>` : ''}
                                    </div>
                                    <div class="bg-white p-4 rounded-lg shadow-sm border border-green-200 flex flex-col items-center justify-center text-center">
                                        <span class="text-[10px] font-bold text-stone-400 uppercase mb-1">A Regra Menos Quebrada (Mas Registada)</span>
                                        <span class="text-green-600 font-black text-sm">${leastBroken ? leastBroken.name : 'Nenhuma infração registada'}</span>
                                        ${leastBroken ? `<span class="text-xs text-green-600 bg-green-50 px-2 py-1 rounded font-bold mt-2">${leastBroken.count} ocorrência(s)</span>` : ''}
                                    </div>
                                </div>
                            </div>
                        `;
                    };

                    const months = [...new Set([...state.logs, ...state.hygieneChecks].map(window.app.getSafeMonthId)), window.app.getMonthId(new Date())].sort().reverse();
                    const selectedMonth = document.getElementById('report_month')?.value || months[0];
                    const monthOpts = months.map(m => `<option value="${m}" ${m===selectedMonth?'selected':''}>${m}</option>`).join('');

                    let reportContent = '';
                    if (state.reportTab === 'fechamento') {
                        const tableRows = window.app.calculateMonthlyReport(selectedMonth).map(row => `
                            <tr class="text-xs md:text-sm border-b hover:bg-stone-50">
                                <td class="px-3 md:px-4 py-3 font-bold text-stone-800">${row.emp.name || 'Sem nome'}</td>
                                <td class="px-3 md:px-4 py-3 text-stone-600">${row.sectorName}</td>
                                <td class="px-3 md:px-4 py-3 text-right text-stone-500">${window.app.formatBRL(row.baseValue)}</td>
                                <td class="px-3 md:px-4 py-3 text-center text-blue-600 font-bold">${row.totalDeductionPct > 0 ? '-'+window.app.formatPct(row.totalDeductionPct) : '0%'}</td>
                                <td class="px-3 md:px-4 py-3 text-right font-black text-green-700 bg-green-50/50">${window.app.formatBRL(row.finalValue)}</td>
                            </tr>
                        `).join('');

                        reportContent = `
                            <div class="overflow-x-auto rounded-xl border border-stone-200 shadow-sm">
                                <table class="w-full text-left whitespace-nowrap bg-white">
                                    <thead class="bg-stone-100 text-stone-500 text-xs uppercase border-b border-stone-200">
                                        <tr><th class="px-3 md:px-4 py-4 font-bold">Colaborador</th><th class="px-3 md:px-4 py-4 font-bold">Setor</th><th class="px-3 md:px-4 py-4 font-bold text-right">Base</th><th class="px-3 md:px-4 py-4 font-bold text-center">Descontos</th><th class="px-3 md:px-4 py-4 font-bold text-right">A Receber</th></tr>
                                    </thead>
                                    <tbody class="divide-y divide-stone-100">${tableRows || '<tr><td colspan="5" class="text-center py-8 text-stone-400">Sem dados.</td></tr>'}</tbody>
                                </table>
                            </div>
                        `;
                    } else if (state.reportTab === 'erros') {
                        reportContent = window.app.generateErrorLogsReportHtml(selectedMonth);
                    } else if (state.reportTab === 'comparativo') {
                        reportContent = window.app.generateComparativeReportHtml(selectedMonth);
                    }

                    return `
                        <div class="no-print flex flex-col md:flex-row justify-between items-start md:items-center mb-6 space-y-4 md:space-y-0">
                            <div class="flex items-center gap-3">
                                <button data-nav="dashboard" class="text-stone-400 hover:text-stone-800 transition-colors" title="Voltar ao Painel">
                                    <i class="fa-solid fa-arrow-left text-xl"></i>
                                </button>
                                <h2 class="text-2xl font-bold text-gray-800 m-0">Relatórios do Dept. Pessoal</h2>
                            </div>
                            
                            <div class="flex flex-col md:flex-row gap-4 no-print bg-white p-4 rounded-xl border border-stone-200 shadow-sm w-full md:w-auto">
                                <div class="flex-1 flex items-center gap-3">
                                    <label class="text-sm font-bold text-stone-500 uppercase"><i class="fa-solid fa-calendar mr-1"></i> Mês</label>
                                    <select id="report_month" class="flex-1 p-3 bg-stone-50 border border-stone-300 rounded-lg outline-none focus:border-yellow-500 text-sm font-bold text-stone-700">${monthOpts}</select>
                                </div>
                                <button data-action="print" class="w-full md:w-auto px-8 py-3 bg-stone-800 text-white rounded-lg font-bold text-sm shadow hover:bg-stone-900 flex justify-center items-center gap-2"><i class="fa-solid fa-print"></i> PDF / Imprimir</button>
                            </div>
                        </div>

                        <div class="flex border-b border-stone-200 bg-white sticky top-[60px] z-10 w-full justify-center mb-6">
                            <div class="flex w-full max-w-md md:max-w-3xl overflow-x-auto custom-scrollbar">
                                <button data-action="setReportTab" data-id="fechamento" class="flex-1 py-4 px-4 whitespace-nowrap text-sm font-bold border-b-2 transition-colors ${state.reportTab === 'fechamento' ? 'border-yellow-500 text-yellow-600' : 'border-transparent text-stone-500'}">Valores</button>
                                <button data-action="setReportTab" data-id="erros" class="flex-1 py-4 px-4 whitespace-nowrap text-sm font-bold border-b-2 transition-colors ${state.reportTab === 'erros' ? 'border-yellow-500 text-yellow-600' : 'border-transparent text-stone-500'}">Análise de Erros</button>
                                <button data-action="setReportTab" data-id="comparativo" class="flex-1 py-4 px-4 whitespace-nowrap text-sm font-bold border-b-2 transition-colors ${state.reportTab === 'comparativo' ? 'border-yellow-500 text-yellow-600' : 'border-transparent text-stone-500'}">Comparativo Mensal</button>
                            </div>
                        </div>

                        <div class="print-card bg-white rounded-xl shadow-sm border border-stone-200 overflow-hidden p-6 md:p-8">
                            <div class="border-b-2 border-stone-900 pb-6 mb-6 flex justify-between items-center">
                                <div>
                                    <h1 class="text-2xl font-black text-stone-900 uppercase">Gratificação Mensal</h1>
                                    <p class="text-sm text-stone-500 uppercase font-bold tracking-widest mt-1">${selectedMonth}</p>
                                </div>
                                ${state.settings?.logo ? `<img src="${state.settings.logo}" class="h-12 md:h-16 object-contain">` : ''}
                            </div>
                            ${reportContent}
                        </div>
                    `;
                },
                configuracoes: () => {
                    const logoHtml = state.settings?.logo 
                        ? `<img src="${state.settings.logo}" class="h-24 object-contain mx-auto mb-4"><button type="button" data-action="confirmRemoveLogo" class="text-red-500 text-sm font-bold underline w-full text-center hover:text-red-700">Remover Logo</button>`
                        : `<i class="fa-solid fa-image text-4xl text-stone-300 mb-3"></i><span class="text-sm font-bold text-stone-400">Selecionar Imagem do Computador</span>`;

                    return `
                        <div class="flex items-center gap-3 mb-6">
                            <button data-nav="dashboard" class="text-stone-400 hover:text-stone-800 transition-colors" title="Voltar ao Painel">
                                <i class="fa-solid fa-arrow-left text-xl"></i>
                            </button>
                            <h2 class="font-black text-stone-800 text-xl m-0">Definições e Backup</h2>
                        </div>
                        <div class="p-6 pb-24 grid grid-cols-1 md:grid-cols-2 gap-8 max-w-5xl mx-auto animate-fade-in">
                            <div class="bg-white p-8 rounded-xl shadow-sm border border-stone-200">
                                <h2 class="font-bold text-stone-800 mb-6 text-base flex items-center gap-2 border-b border-stone-100 pb-3"><i class="fa-solid fa-file-pdf text-yellow-600 text-xl"></i> Personalização (PDF)</h2>
                                <form id="form-settings" class="space-y-6">
                                    <label class="flex flex-col justify-center items-center w-full p-8 border-2 border-dashed border-stone-300 rounded-xl cursor-pointer hover:bg-stone-50 text-center transition-colors">
                                        <input type='file' id="logo_upload" class="hidden" accept="image/*" />
                                        ${logoHtml}
                                    </label>
                                    <button type="submit" class="w-full py-4 bg-stone-800 text-white rounded-xl font-bold shadow hover:bg-stone-900 text-sm flex items-center justify-center gap-2"><i class="fa-solid fa-save"></i> Guardar Alterações</button>
                                </form>
                            </div>

                            <div class="bg-white p-8 rounded-xl shadow-sm border border-stone-200">
                                <h2 class="font-bold text-red-600 mb-6 text-base flex items-center gap-2 border-b border-stone-100 pb-3"><i class="fa-solid fa-triangle-exclamation text-xl"></i> Zona de Perigo</h2>
                                <p class="text-sm text-stone-500 mb-6 leading-relaxed">Ações que afetam a sua sessão atual ou dados do sistema. Proceda com atenção.</p>
                                <button data-action="logout" class="w-full py-4 border-2 border-red-200 bg-red-50 text-red-700 rounded-xl font-bold shadow-sm hover:bg-red-100 text-sm flex items-center justify-center gap-2 transition-colors"><i class="fa-solid fa-arrow-right-from-bracket"></i> Terminar Sessão no Dispositivo</button>
                            </div>
                        </div>
                    `;
                }
            }
        };

        // Event Listeners Genéricos (Delegação de cliques)
        document.addEventListener('click', async (e) => {
            const navBtn = e.target.closest('[data-nav]');
            if (navBtn) {
                e.preventDefault();
                window.app.navigate(navBtn.dataset.nav);
                return;
            }

            const actionBtn = e.target.closest('[data-action]');
            if (!actionBtn) return;
            
            const action = actionBtn.dataset.action;
            const id = actionBtn.dataset.id;

            try {
                switch (action) {
                    case 'print': window.print(); break;
                    case 'showImportModal': window.app.showImportModal(); break;
                    case 'showEmployeeForm': window.app.showEmployeeForm(id); break;
                    case 'showSectorForm': window.app.showSectorForm(id); break;
                    case 'showRuleForm': window.app.showRuleForm(id); break;
                    case 'showProrationForm': window.app.showProrationForm(); break;
                    case 'closeModal': window.app.closeModal(); break;
                    case 'setLogTab': window.app.setLogTab(id); break;
                    case 'setReportTab': window.app.setReportTab(id); break;
                    case 'loginGoogle': window.app.loginWithGoogle(); break;
                    case 'loginAnon': window.app.loginAnonymously(); break;
                    case 'logout': window.app.logout(); break;
                    
                    case 'deleteEmployee': window.app.confirmAction("Remover este colaborador?", "executeDeleteEmployee", id); break;
                    case 'executeDeleteEmployee': if(db) await deleteDoc(doc(db, `artifacts/${appId}/public/data/employees`, id)); window.app.toast("Removido.", "success"); window.app.closeModal(); break;
                        
                    case 'deleteSector':
                        const empsInSector = state.employees.filter(emp => emp.sectorId === id);
                        if (empsInSector.length > 0) return window.app.toast(`Existem ${empsInSector.length} pessoas no setor.`, "error");
                        window.app.confirmAction("Remover este setor?", "executeDeleteSector", id); break;
                    case 'executeDeleteSector': if(db) await deleteDoc(doc(db, `artifacts/${appId}/public/data/sectors`, id)); window.app.toast("Removido.", "success"); window.app.closeModal(); break;

                    case 'deleteRule':
                        window.app.confirmAction("Remover critério?", "executeDeleteRule", id); break;
                    case 'executeDeleteRule': if(db) await deleteDoc(doc(db, `artifacts/${appId}/public/data/rules`, id)); window.app.toast("Removido.", "success"); window.app.closeModal(); break;

                    case 'deleteLog': window.app.confirmAction("Excluir registo de erro?", "executeDeleteLog", id); break;
                    case 'executeDeleteLog': if(db) await deleteDoc(doc(db, `artifacts/${appId}/public/data/logs`, id)); window.app.toast("Excluído.", "success"); window.app.closeModal(); break;

                    case 'deleteHygieneRecord': window.app.confirmAction("Remover penalidade?", "executeDeleteHygieneRecord", id); break;
                    case 'executeDeleteHygieneRecord': if(db) await deleteDoc(doc(db, `artifacts/${appId}/public/data/hygiene_checks`, id)); window.app.toast("Removida.", "success"); window.app.closeModal(); break;

                    case 'confirmDeleteProration': window.app.confirmAction("Excluir Férias/Admissão?", "executeDeleteProration", id); break;
                    case 'executeDeleteProration': if(db) await deleteDoc(doc(db, `artifacts/${appId}/public/data/prorations`, id)); window.app.toast("Excluído.", "success"); window.app.closeModal(); break;

                    case 'confirmRemoveLogo': window.app.confirmAction("Remover a logo?", "executeRemoveLogo"); break;
                    case 'executeRemoveLogo': if(db) await setDoc(doc(db, `artifacts/${appId}/public/data/settings`, 'main'), { logo: '' }); window.app.toast("Removida.", "success"); window.app.closeModal(); break;
                }
            } catch (err) {
                window.app.toast("Erro na operação.", "error");
            }
        });

        // Formulários Controlados
        document.addEventListener('submit', async (e) => {
            const formId = e.target.id;
            e.preventDefault();

            try {
                if (formId === 'form-employee') {
                    const id = document.getElementById('emp_id').value || window.app.generateId();
                    const customValInput = document.getElementById('emp_custom_val').value;
                    // Garante que o nome nunca é salvo nulo e impede crashe nas funções de texto
                    const safeName = document.getElementById('emp_name').value || 'Colaborador sem nome';
                    
                    const data = {
                        name: safeName,
                        sectorId: document.getElementById('emp_sector').value,
                        role: document.getElementById('emp_role').value,
                        customBaseValue: customValInput ? Number(customValInput) : null,
                        active: true
                    };
                    if(db) await setDoc(doc(db, `artifacts/${appId}/public/data/employees`, id), data);
                    window.app.toast("Colaborador salvo.", "success");
                    window.app.closeModal();
                }

                if (formId === 'form-sector') {
                    const id = document.getElementById('sec_id').value || window.app.generateId();
                    const data = {
                        name: document.getElementById('sec_name').value,
                        val_liderado: Number(document.getElementById('sec_val_liderado').value),
                        val_lider: Number(document.getElementById('sec_val_lider').value),
                    };
                    if(db) await setDoc(doc(db, `artifacts/${appId}/public/data/sectors`, id), data);
                    window.app.toast("Setor salvo.", "success");
                    window.app.closeModal();
                }

                if (formId === 'form-rule') {
                    const id = document.getElementById('rule_id').value || window.app.generateId();
                    const data = {
                        name: document.getElementById('rule_name').value,
                        pct: Number(document.getElementById('rule_pct').value) / 100,
                        max: Number(document.getElementById('rule_max').value)
                    };
                    if(db) await setDoc(doc(db, `artifacts/${appId}/public/data/rules`, id), data);
                    window.app.toast("Regra salva.", "success");
                    window.app.closeModal();
                }

                if (formId === 'form-proration') {
                    const empId = document.getElementById('pro_emp').value;
                    const monthId = document.getElementById('pro_month').value;
                    const entryDate = document.getElementById('pro_entry_date').value;
                    
                    if(!empId || !monthId || !entryDate) return window.app.toast("Preencha os campos obrigatórios.", "error");

                    const [year, month] = monthId.split('-');
                    const totalDays = new Date(year, month, 0).getDate();
                    const entry = new Date(entryDate + 'T12:00:00');
                    const refStart = new Date(year, month - 1, 1);
                    const refEnd = new Date(year, month, 0);
                    
                    let daysWorked = totalDays;
                    if (entry > refEnd) {
                        daysWorked = 0;
                    } else if (entry >= refStart) {
                        daysWorked = totalDays - entry.getDate() + 1;
                    }

                    const id = `${empId}_${monthId}`;
                    if(db) await setDoc(doc(db, `artifacts/${appId}/public/data/prorations`, id), { employeeId: empId, monthId, daysWorked, totalDays });
                    window.app.toast("Registo salvo.", "success");
                    window.app.closeModal();
                }

                if (formId === 'log_form') {
                    const date = document.getElementById('log_date').value;
                    const ruleId = document.getElementById('log_rule').value;
                    const obs = document.getElementById('log_obs').value;
                    
                    if(!date || !ruleId) return window.app.toast("Preencha todos os campos.", "error");
                    
                    const checkedBoxes = document.querySelectorAll('.log-emp-cb:checked');
                    if (checkedBoxes.length === 0) return window.app.toast("Selecione pelo menos um colaborador na lista.", "error");

                    const monthId = window.app.getMonthId(new Date(date + 'T12:00:00'));

                    if(confirm(`Aplicar penalidade para ${checkedBoxes.length} colaborador(es) selecionado(s)?`)) {
                        if(db) {
                            const promises = Array.from(checkedBoxes).map(cb => {
                                const empId = cb.value;
                                const safeObs = obs ? obs.replace(/'/g, "\\'").replace(/"/g, "&quot;") : '';

                                return setDoc(doc(db, `artifacts/${appId}/public/data/logs`, window.app.generateId()), { 
                                    employeeId: empId, 
                                    date, 
                                    ruleId, 
                                    monthId, 
                                    timestamp: Date.now(), 
                                    obs: safeObs
                                });
                            });
                            await Promise.all(promises);
                        }
                        
                        document.getElementById('log_form').reset();
                        document.getElementById('log_date').value = date;
                        document.getElementById('emps_container').classList.add('hidden');
                        window.app.toast("Registo efetuado com sucesso.", "success");
                    }
                }

                if (formId === 'form-settings') {
                    const fileInput = document.getElementById('logo_upload');
                    if (fileInput.files && fileInput.files[0]) {
                        const reader = new FileReader();
                        reader.onload = async (event) => {
                            if(db) await setDoc(doc(db, `artifacts/${appId}/public/data/settings`, 'main'), { logo: event.target.result });
                            window.app.toast("Logo atualizada!", "success");
                        };
                        reader.readAsDataURL(fileInput.files[0]);
                    }
                }
            } catch (err) {
                window.app.toast("Erro ao guardar.", "error");
            }
        });

        // Eventos Change e Input 
        document.addEventListener('change', async (e) => {
            if (e.target.classList.contains('hygiene-checkbox')) {
                const empId = e.target.dataset.empid;
                const date = e.target.dataset.date;
                const isChecked = e.target.checked;
                const id = `${date}_${empId}`;
                
                if (isChecked) {
                    const monthId = window.app.getMonthId(new Date(date + 'T12:00:00'));
                    if(db) await setDoc(doc(db, `artifacts/${appId}/public/data/hygiene_checks`, id), { employeeId: empId, date, monthId, timestamp: Date.now(), obs: '' });
                } else {
                    if(db) await deleteDoc(doc(db, `artifacts/${appId}/public/data/hygiene_checks`, id));
                }
            }

            if (e.target.id === 'sort_colab' || e.target.id === 'filter_sector_colab') window.app.filterColaboradores();
            if (e.target.id === 'hist_month' || e.target.id === 'hist_sec') window.app.renderLogsHistoryList();
            if (e.target.id === 'report_month' || e.target.id === 'higiene_date') window.app.render();
            if (e.target.id === 'chart_month') window.app.renderCharts();
            
            // Lógica do filtro da página de Higiene
            if (e.target.id === 'filter_sector_higiene') {
                window.app.filterHigiene();
            }

            // Lógica do novo formulário de lançamentos
            if (e.target.id === 'log_sec_select') {
                window.app.renderLogEmpsChecklist(e.target.value);
            }
            if (e.target.id === 'log_select_all') {
                const visibleCheckboxes = Array.from(document.querySelectorAll('.emp-cb-item'))
                    .filter(item => item.style.display !== 'none')
                    .map(item => item.querySelector('.log-emp-cb'));
                visibleCheckboxes.forEach(cb => cb.checked = e.target.checked);
                window.app.updateLogEmpCount();
            }
            if (e.target.classList.contains('log-emp-cb')) {
                window.app.updateLogEmpCount();
            }
        });

        document.addEventListener('input', (e) => {
            if (e.target.id === 'search_colab') window.app.filterColaboradores();
            if (e.target.id === 'log_emp_search') window.app.filterLogEmpChecklist(e.target.value);
            if (e.target.id === 'search_higiene') window.app.filterHigiene();
            
            // Filtro da aba Férias/Admissão (Nova funcionalidade)
            if (e.target.id === 'pro_emp_search') {
                const term = e.target.value.toLowerCase();
                const select = document.getElementById('pro_emp');
                if(!select) return;
                Array.from(select.options).forEach(opt => {
                    if (opt.value === "") return;
                    if (opt.text.toLowerCase().includes(term)) opt.style.display = ''; 
                    else opt.style.display = 'none';
                });
            }
            
            // Calculador dinâmico do formulário "Proporcionais"
            if (e.target.id === 'pro_entry_date' || e.target.id === 'pro_month') {
                const monthVal = document.getElementById('pro_month')?.value;
                const dateVal = document.getElementById('pro_entry_date')?.value;
                const preview = document.getElementById('pro_calc_preview');
                
                if (monthVal && dateVal && preview) {
                    const [year, month] = monthVal.split('-');
                    const totalDays = new Date(year, month, 0).getDate();
                    const entry = new Date(dateVal + 'T12:00:00');
                    const refStart = new Date(year, month - 1, 1);
                    const refEnd = new Date(year, month, 0);
                    
                    let days = totalDays;
                    if (entry > refEnd) days = 0;
                    else if (entry >= refStart) days = totalDays - entry.getDate() + 1;
                    
                    preview.innerText = `${days} de ${totalDays} dias`;
                }
            }
        });

        document.addEventListener('focusout', async (e) => {
            if (e.target.classList.contains('hygiene-obs-input')) {
                const id = `${e.target.dataset.date}_${e.target.dataset.empid}`;
                if(db) await setDoc(doc(db, `artifacts/${appId}/public/data/hygiene_checks`, id), { obs: e.target.value }, { merge: true });
            }
        });

        // Iniciar Firebase
        initFirebase();
    </script>
</body>
</html>
