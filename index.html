<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gestão de Gratificações</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- SheetJS para Leitura de Planilhas -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <!-- Chart.js para Gráficos -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #e7e5e4; /* stone-200 fundo exterior */
            color: #1c1917; /* stone-950 */
            -webkit-tap-highlight-color: transparent;
        }
        
        .custom-scrollbar::-webkit-scrollbar { height: 6px; width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #e5e7eb; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #a8a29e; border-radius: 4px; }
        
        .card-shadow { box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06); }
        .modal-overlay { background-color: rgba(0, 0, 0, 0.6); backdrop-filter: blur(2px); }
        
        .animate-fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Loader */
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #eab308; /* yellow-500 */
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* iOS Style Print/PDF Configuration */
        @media print {
            @page { margin: 15mm; }
            body { 
                background-color: white !important; 
                -webkit-print-color-adjust: exact; 
                print-color-adjust: exact; 
            }
            .no-print, #login-screen { 
                display: none !important; 
            }
            #app-layout {
                display: block !important;
                max-width: none !important;
                box-shadow: none !important;
                background-color: white !important;
            }
            .print-card { 
                border-radius: 0 !important; 
                border: none !important; 
                padding: 0 !important; 
                box-shadow: none !important;
            }
            /* Ajustes para garantir que os gráficos não quebrem na impressão */
            canvas {
                min-height: 250px !important;
                max-width: 100% !important;
            }
            .chart-container-print {
                page-break-inside: avoid;
                display: block !important;
                width: 100% !important;
            }
            table { border-collapse: collapse !important; width: 100% !important; }
            th { background-color: #f9fafb !important; color: #374151 !important; border-bottom: 2px solid #e5e7eb !important; }
            td { border-bottom: 1px solid #f3f4f6 !important; }
        }
    </style>
</head>
<body class="font-sans antialiased overflow-x-hidden">

    <!-- Loading Overlay -->
    <div id="loading-overlay" class="fixed inset-0 bg-stone-100 z-50 flex flex-col items-center justify-center">
        <div class="loader mb-4"></div>
        <h2 class="text-xl font-bold text-stone-700 animate-pulse">A carregar sistema...</h2>
    </div>

    <!-- Ecrã de Login -->
    <div id="login-screen" class="hidden fixed inset-0 z-40 bg-stone-900 flex-col items-center justify-center p-4">
        <div class="bg-stone-100 rounded-2xl shadow-2xl p-8 max-w-sm w-full text-center animate-fade-in">
            <div class="w-20 h-20 bg-yellow-100 rounded-full flex items-center justify-center mx-auto mb-6">
                <i class="fa-solid fa-medal text-4xl text-yellow-600"></i>
            </div>
            <h1 class="text-2xl font-bold text-stone-800 mb-2">Gestão de Gratificações</h1>
            <p class="text-stone-500 mb-8 text-sm">Controle financeiro e de indicadores.</p>
            
            <button id="btn-login-google" class="w-full bg-white border border-stone-300 hover:bg-stone-50 text-stone-700 font-bold py-3.5 px-4 rounded-xl shadow-sm transition-colors flex items-center justify-center space-x-3 mb-4">
                <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-6 h-6" alt="Google">
                <span>Aceder com Google</span>
            </button>

            <button id="btn-login-anon" class="text-stone-400 hover:text-yellow-600 text-xs font-bold underline transition-colors">
                Aceder como Visitante (Modo Teste)
            </button>
        </div>
    </div>

    <!-- Layout Principal - Expandido para Modo Paisagem (max-w-7xl) -->
    <div id="app-layout" class="hidden max-w-7xl w-full mx-auto min-h-screen bg-stone-100 flex-col text-stone-900 shadow-2xl relative">
        <main class="flex-1 w-full" id="app-container">
            <!-- Conteúdo Dinâmico -->
        </main>
    </div>

    <!-- Modais -->
    <div id="modals" class="no-print"></div>

    <!-- Lógica da Aplicação Integrada -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged, GoogleAuthProvider, signInWithPopup, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, query, onSnapshot, doc, setDoc, deleteDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Estado Global
        const state = {
            view: 'dashboard',
            reportTab: 'fechamento', 
            logTab: 'novo',
            user: null,
            settings: { logo: '' },
            employees: [],
            sectors: [],
            logs: [],
            prorations: [],
            hygieneChecks: [],
            rules: [],
            chartInstances: {} // Para gerir a destruição/atualização dos gráficos
        };

        let db, auth, appId, unsubscribeFuncs = [];

        // Configuração Inicial do Firebase
        const initFirebase = async () => {
            try {
                const defaultFirebaseConfig = {
                    apiKey: "AIzaSyAACkZnNeizzXIfH0cS1WZWCITD0scqpJY",
                    authDomain: "gratificacao-2e6e8.firebaseapp.com",
                    projectId: "gratificacao-2e6e8",
                    storageBucket: "gratificacao-2e6e8.firebasestorage.app",
                    messagingSenderId: "843644337269",
                    appId: "1:843644337269:web:36c4bfb09a19f9f0a44c3c",
                    measurementId: "G-66CCNYZEN0"
                };

                const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : defaultFirebaseConfig;
                appId = typeof __app_id !== 'undefined' ? __app_id : 'gestao-grat-app';
                
                const firebaseApp = initializeApp(firebaseConfig);
                auth = getAuth(firebaseApp);
                db = getFirestore(firebaseApp);

                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                }

                onAuthStateChanged(auth, (user) => {
                    const loader = document.getElementById('loading-overlay');
                    const loginScreen = document.getElementById('login-screen');
                    const appLayout = document.getElementById('app-layout');

                    loader.classList.add('hidden');

                    if (user) {
                        state.user = user;
                        loginScreen.classList.add('hidden');
                        loginScreen.classList.remove('flex');
                        appLayout.classList.remove('hidden');
                        appLayout.classList.add('flex');
                        setupListeners();
                    } else {
                        state.user = null;
                        appLayout.classList.add('hidden');
                        appLayout.classList.remove('flex');
                        loginScreen.classList.remove('hidden');
                        loginScreen.classList.add('flex');
                    }
                });

            } catch (error) {
                console.error("Firebase init error:", error);
                document.getElementById('loading-overlay').classList.add('hidden');
                alert("Erro crítico ao inicializar o Firebase. Verifique a configuração.");
            }
        };

        const setupListeners = () => {
            unsubscribeFuncs.forEach(unsub => unsub());
            const publicPath = `artifacts/${appId}/public/data`;
            
            unsubscribeFuncs.push(onSnapshot(doc(db, `${publicPath}/settings`, 'main'), (docSnap) => {
                if (docSnap.exists()) state.settings = docSnap.data();
                if(state.view === 'configuracoes' || state.view === 'relatorios') window.app.render();
            }, (e) => console.error(e)));

            unsubscribeFuncs.push(onSnapshot(query(collection(db, `${publicPath}/employees`)), (snap) => {
                state.employees = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                if(state.view === 'colaboradores' || state.view === 'lancamentos' || state.view === 'higiene') window.app.render();
            }, (e) => console.error(e)));

            unsubscribeFuncs.push(onSnapshot(query(collection(db, `${publicPath}/sectors`)), (snap) => {
                state.sectors = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                if(state.sectors.length === 0) window.app.populateInitialSectors();
                if(state.view === 'setores' || state.view === 'colaboradores' || state.view === 'lancamentos' || state.view === 'indicadores') window.app.render();
            }, (e) => console.error(e)));

            unsubscribeFuncs.push(onSnapshot(query(collection(db, `${publicPath}/rules`)), (snap) => {
                state.rules = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                if(state.rules.length === 0) window.app.populateInitialRules();
                if(state.view === 'setores' || state.view === 'lancamentos' || state.view === 'relatorios' || state.view === 'dashboard' || state.view === 'indicadores') window.app.render();
            }, (e) => console.error(e)));

            unsubscribeFuncs.push(onSnapshot(query(collection(db, `${publicPath}/logs`)), (snap) => {
                state.logs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                if(state.view === 'lancamentos' || state.view === 'relatorios' || state.view === 'dashboard' || state.view === 'indicadores') window.app.render();
            }, (e) => console.error(e)));

            unsubscribeFuncs.push(onSnapshot(query(collection(db, `${publicPath}/prorations`)), (snap) => {
                state.prorations = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                if(state.view === 'proporcionais' || state.view === 'relatorios') window.app.render();
            }, (e) => console.error(e)));

            unsubscribeFuncs.push(onSnapshot(query(collection(db, `${publicPath}/hygiene_checks`)), (snap) => {
                state.hygieneChecks = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                if (state.view === 'higiene' || state.view === 'relatorios' || state.view === 'lancamentos' || state.view === 'indicadores') window.app.render();
            }, (e) => console.error(e)));
        };

        window.app = {
            generateId: () => {
                return typeof crypto !== 'undefined' && typeof crypto.randomUUID === 'function' 
                    ? crypto.randomUUID() 
                    : Date.now().toString(36) + Math.random().toString(36).substring(2);
            },
            
            getMonthId: (dateObj) => {
                 if (isNaN(dateObj.getTime())) return window.app.getMonthId(new Date()); // Prevenção de erro Invalid Date
                 return `${dateObj.getFullYear()}-${String(dateObj.getMonth() + 1).padStart(2, '0')}`;
            },

            // Função de segurança para extrair MonthId garantido sem erros de formatação
            getSafeMonthId: (item) => {
                if (item.monthId) return item.monthId;
                if (item.date) return window.app.getMonthId(new Date(item.date + 'T12:00:00'));
                return window.app.getMonthId(new Date());
            },

            formatBRL: (val) => Number(val).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' }),
            formatPct: (val) => (Number(val) * 100).toFixed(2) + '%',

            toast: (msg, type = 'info') => {
                const colors = { success: 'bg-green-600', error: 'bg-red-600', info: 'bg-stone-600' };
                const icon = { success: 'fa-check', error: 'fa-triangle-exclamation', info: 'fa-info-circle' };
                const div = document.createElement('div');
                div.className = `fixed top-4 right-4 ${colors[type]} text-white px-4 py-3 rounded-lg shadow-xl font-bold flex items-center space-x-2 z-50 animate-fade-in`;
                div.innerHTML = `<i class="fa-solid ${icon[type]}"></i><span>${msg}</span>`;
                document.body.appendChild(div);
                setTimeout(() => div.remove(), 3000);
            },

            openModal: (html) => {
                document.getElementById('modals').innerHTML = `
                    <div class="fixed inset-0 z-50 flex items-center justify-center p-4 modal-overlay no-print">
                        <div class="bg-white rounded-xl shadow-2xl w-full max-w-md overflow-hidden animate-fade-in text-stone-900">
                            ${html}
                        </div>
                    </div>
                `;
            },

            closeModal: () => {
                document.getElementById('modals').innerHTML = '';
            },

            confirmAction: (msg, actionStr, dataId = '') => {
                window.app.openModal(`
                    <div class="p-6 text-center">
                        <i class="fa-solid fa-circle-exclamation text-4xl text-yellow-500 mb-4"></i>
                        <p class="text-stone-800 font-bold mb-6">${msg}</p>
                        <div class="flex gap-2 pt-2">
                            <button data-action="closeModal" class="flex-1 py-3 border border-stone-300 rounded-lg font-bold text-stone-600 hover:bg-stone-50">Cancelar</button>
                            <button data-action="${actionStr}" data-id="${dataId}" class="flex-1 py-3 bg-red-600 text-white rounded-lg font-bold hover:bg-red-700">Confirmar</button>
                        </div>
                    </div>
                `);
            },

            loginWithGoogle: async () => {
                const provider = new GoogleAuthProvider();
                try {
                    await signInWithPopup(auth, provider);
                    window.app.toast("Login com sucesso!", "success");
                } catch (error) {
                    window.app.toast("Falha na autenticação.", "error");
                }
            },

            loginAnonymously: async () => {
                try {
                    window.app.toast("Entrando no modo teste...", "info");
                    await signInAnonymously(auth);
                } catch (error) {
                    window.app.toast("Falha na autenticação anônima.", "error");
                }
            },

            logout: async () => {
                try {
                    await signOut(auth);
                    window.location.reload();
                } catch (error) {
                    window.app.toast("Erro ao desconectar.", "error");
                }
            },

            populateInitialSectors: async () => {
                const initial = [
                    { id: 'salgado', name: 'Salgado', val_liderado: 180, val_lider: 250 },
                    { id: 'ped', name: 'P&D', val_liderado: 180, val_lider: 250 }
                ];
                for (let sec of initial) await setDoc(doc(db, `artifacts/${appId}/public/data/sectors`, sec.id), sec);
            },
            
            populateInitialRules: async () => {
                const initialRules = [
                    { id: 'produtividade', name: 'Produtividade', pct: 0.20, max: 1 },
                    { id: 'higiene', name: 'Higiene Pessoal (Inadequada)', pct: 0.0333, max: 3 }
                ];
                for (let r of initialRules) await setDoc(doc(db, `artifacts/${appId}/public/data/rules`, r.id), r);
            },

            navigate: (view) => {
                state.view = view;
                window.app.render();
                window.scrollTo(0, 0);
            },

            setReportTab: (tab) => { state.reportTab = tab; window.app.render(); },
            setLogTab: (tab) => { state.logTab = tab; window.app.render(); },

            updateLogEmpCount: () => {
                const checkboxes = document.querySelectorAll('.log-emp-cb');
                const checked = document.querySelectorAll('.log-emp-cb:checked');
                const selectAll = document.getElementById('log_select_all');
                const countSpan = document.getElementById('log_emp_count');
                
                const visibleItems = Array.from(document.querySelectorAll('.emp-cb-item')).filter(item => item.style.display !== 'none');
                const visibleCheckboxes = visibleItems.map(item => item.querySelector('.log-emp-cb'));
                const visibleChecked = visibleCheckboxes.filter(cb => cb.checked);
                
                if(selectAll && visibleCheckboxes.length > 0) {
                    selectAll.checked = visibleCheckboxes.length === visibleChecked.length;
                }
                if(countSpan) {
                    countSpan.innerText = `${checked.length} selecionado(s)`;
                }
            },

            renderLogEmpsChecklist: (sectorId) => {
                const container = document.getElementById('emps_container');
                const listDiv = document.getElementById('emps_list');
                const selectAll = document.getElementById('log_select_all');
                const countSpan = document.getElementById('log_emp_count');
                const searchInput = document.getElementById('log_emp_search');
                
                if (!sectorId) {
                    container.classList.add('hidden');
                    return;
                }
                container.classList.remove('hidden');
                if (selectAll) selectAll.checked = false;
                if (searchInput) searchInput.value = '';
                
                let filtered = state.employees;
                if (sectorId !== 'todos') {
                    filtered = filtered.filter(e => e.sectorId === sectorId);
                }
                // Ordenação segura (fallback para strings vazias se o nome não existir)
                filtered.sort((a,b) => (a.name||'').localeCompare(b.name||''));
                
                if (filtered.length === 0) {
                    listDiv.innerHTML = '<p class="text-stone-400 text-xs text-center py-6">Nenhum colaborador encontrado.</p>';
                    if (countSpan) countSpan.innerText = '0 selecionados';
                    return;
                }

                listDiv.innerHTML = filtered.map(emp => {
                    const sec = state.sectors.find(s => s.id === emp.sectorId);
                    return `
                    <label class="emp-cb-item flex items-center gap-3 p-3 hover:bg-stone-50 rounded-lg cursor-pointer border border-transparent hover:border-stone-200 transition-colors" data-name="${(emp.name||'').toLowerCase()}">
                        <input type="checkbox" value="${emp.id}" class="log-emp-cb w-5 h-5 text-yellow-600 rounded border-stone-300 focus:ring-yellow-500">
                        <div>
                            <span class="text-sm text-stone-800 font-bold block leading-tight">${emp.name || 'Colaborador sem nome'}</span>
                            <span class="text-[10px] text-stone-500 font-bold uppercase">${sec ? sec.name : 'Geral'}</span>
                        </div>
                    </label>
                    `;
                }).join('');
                
                if (countSpan) countSpan.innerText = `0 selecionado(s)`;
            },

            filterLogEmpChecklist: (term) => {
                term = term.toLowerCase();
                const items = document.querySelectorAll('.emp-cb-item');
                items.forEach(item => {
                    if (item.dataset.name.includes(term)) {
                        item.style.display = 'flex';
                    } else {
                        item.style.display = 'none';
                    }
                });
                window.app.updateLogEmpCount();
            },

            filterColaboradores: () => {
                const term = (document.getElementById('search_colab')?.value || '').toLowerCase();
                const sortType = document.getElementById('sort_colab')?.value || 'name_asc';
                const sectorFilter = document.getElementById('filter_sector_colab')?.value || '';
                
                let filtered = state.employees.filter(e => {
                    const matchName = (e.name||'').toLowerCase().includes(term);
                    const matchSector = sectorFilter === '' || e.sectorId === sectorFilter;
                    return matchName && matchSector;
                });
                
                filtered.sort((a,b) => {
                    if (sortType === 'name_asc') return (a.name||'').localeCompare(b.name||'');
                    if (sortType === 'name_desc') return (b.name||'').localeCompare(a.name||'');
                    if (sortType === 'sec_asc') {
                        const secA = state.sectors.find(s => s.id === a.sectorId)?.name || 'Z';
                        const secB = state.sectors.find(s => s.id === b.sectorId)?.name || 'Z';
                        return secA.localeCompare(secB) || (a.name||'').localeCompare(b.name||'');
                    }
                    return 0;
                });

                const container = document.getElementById('colab_list');
                if(!container) return;

                const items = filtered.map(emp => {
                    const sec = state.sectors.find(s => s.id === emp.sectorId);
                    const roleName = emp.role === 'lider' ? '<span class="text-[10px] bg-stone-200 px-2 py-0.5 rounded border border-stone-300 font-bold uppercase">Líder</span>' : '<span class="text-[10px] bg-stone-100 text-stone-500 px-2 py-0.5 rounded font-bold uppercase">Liderado</span>';
                    let baseVal = emp.customBaseValue ? emp.customBaseValue : (sec ? (emp.role === 'lider' ? sec.val_lider : sec.val_liderado) : 0);
                    const valDisplay = emp.customBaseValue 
                        ? `<span class="text-green-600 font-bold text-sm">${window.app.formatBRL(baseVal)} *</span>` 
                        : `<span class="text-stone-700 font-bold text-sm">${window.app.formatBRL(baseVal)}</span>`;

                    return `
                        <div class="bg-white p-4 rounded-xl shadow-sm border border-stone-200 flex justify-between items-center animate-fade-in">
                            <div>
                                <p class="font-bold text-stone-800 leading-tight">${emp.name || 'Sem nome'}</p>
                                <div class="flex items-center gap-2 mt-1">
                                    <span class="text-xs text-stone-500">${sec ? sec.name : 'N/A'}</span>
                                    ${roleName}
                                </div>
                            </div>
                            <div class="text-right flex flex-col items-end gap-2">
                                ${valDisplay}
                                <div class="flex gap-2">
                                    <button data-action="showEmployeeForm" data-id="${emp.id}" class="p-1.5 bg-stone-100 rounded text-stone-500 hover:text-yellow-600"><i class="fa-solid fa-pen"></i></button>
                                    <button data-action="deleteEmployee" data-id="${emp.id}" class="p-1.5 bg-stone-100 rounded text-red-500 hover:text-red-700"><i class="fa-solid fa-trash"></i></button>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
                container.innerHTML = items || '<div class="text-center p-6 text-stone-500 col-span-full">Nenhum encontrado.</div>';
            },

            filterHigiene: () => {
                const term = (document.getElementById('search_higiene')?.value || '').toLowerCase();
                const sectorId = document.getElementById('filter_sector_higiene')?.value || '';

                document.querySelectorAll('.sector-group').forEach(group => {
                    const groupSecId = group.dataset.secid;
                    let hasVisible = false;

                    // Filtrar por setor primeiro
                    if (sectorId !== '' && groupSecId !== sectorId) {
                        group.style.display = 'none';
                        return; 
                    }

                    // Filtrar por nome dentro do setor visível
                    group.querySelectorAll('.higiene-emp-row').forEach(row => {
                        if (row.dataset.name.includes(term)) { 
                            row.style.display = 'flex'; 
                            hasVisible = true; 
                        } else { 
                            row.style.display = 'none'; 
                        }
                    });

                    group.style.display = hasVisible ? 'block' : 'none';
                });
            },

            renderLogsHistoryList: () => {
                try {
                    const month = document.getElementById('hist_month')?.value || window.app.getMonthId(new Date());
                    const sectorId = document.getElementById('hist_sec')?.value || '';
                    
                    let filteredLogs = state.logs.filter(l => window.app.getSafeMonthId(l) === month);
                    let filteredHygiene = state.hygieneChecks.filter(h => window.app.getSafeMonthId(h) === month);
                    
                    if (sectorId) {
                        const empsInSec = state.employees.filter(e => e.sectorId === sectorId).map(e => e.id);
                        filteredLogs = filteredLogs.filter(l => empsInSec.includes(l.employeeId));
                        filteredHygiene = filteredHygiene.filter(h => empsInSec.includes(h.employeeId));
                    }

                    const hygieneAsLogs = filteredHygiene.map(h => ({
                        id: h.id, employeeId: h.employeeId, date: h.date, ruleId: 'higiene', obs: h.obs, timestamp: h.timestamp, isHygiene: true
                    }));

                    const allRecords = [...filteredLogs, ...hygieneAsLogs].sort((a,b) => (b.timestamp || 0) - (a.timestamp || 0));
                    const container = document.getElementById('log_history_container');
                    if (!container) return;

                    container.className = "grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 pb-8";

                    if (allRecords.length === 0) {
                        container.innerHTML = '<div class="p-6 text-center text-stone-500 bg-white rounded-xl border border-stone-200 shadow-sm col-span-full">Nenhum registo encontrado.</div>';
                        return;
                    }

                    container.innerHTML = allRecords.map(log => {
                        const emp = state.employees.find(e => e.id === log.employeeId);
                        const sec = state.sectors.find(s => s.id === emp?.sectorId);
                        const rule = state.rules.find(r => r.id === log.ruleId);
                        const dateStr = log.date ? log.date.split('-').reverse().join('/') : '--/--/----';
                        const obsSnippet = log.obs ? `<div class="text-xs text-stone-600 bg-stone-50 p-2 rounded border border-stone-200 mt-2 italic">Obs: ${log.obs}</div>` : '';
                        const deleteAction = log.isHygiene ? 'deleteHygieneRecord' : 'deleteLog';
                        
                        const ruleName = log.ruleId === 'zerar_gratificacao' ? 'Zerado (100%)' : (rule ? rule.name : (log.isHygiene ? 'Higiene Pessoal' : 'Infração'));

                        return `
                            <div class="bg-white p-4 rounded-xl border border-stone-200 shadow-sm animate-fade-in relative flex flex-col justify-between">
                                <button data-action="${deleteAction}" data-id="${log.id}" class="absolute top-4 right-4 text-red-500 bg-stone-100 p-2 rounded hover:bg-red-50 transition-colors"><i class="fa-solid fa-trash"></i></button>
                                <div class="pr-10">
                                    <span class="text-[10px] font-bold text-stone-400 uppercase"><i class="fa-solid fa-calendar mr-1"></i> ${dateStr}</span>
                                    <h4 class="font-bold text-stone-800 text-sm mt-1">${emp ? (emp.name || 'Sem Nome') : '<span class="text-red-500 italic">Colab. Excluído</span>'}</h4>
                                    <div class="flex items-center gap-2 mt-1 flex-wrap">
                                        <span class="text-[10px] bg-stone-100 border px-1.5 rounded text-stone-500">${sec ? sec.name : 'N/A'}</span>
                                        <span class="text-xs font-bold text-red-600">${ruleName}</span>
                                    </div>
                                    ${obsSnippet}
                                </div>
                            </div>
                        `;
                    }).join('');
                } catch (e) {
                    console.error("Erro ao renderizar histórico: ", e);
                    const container = document.getElementById('log_history_container');
                    if (container) container.innerHTML = '<div class="p-6 text-center text-red-500 bg-red-50 rounded-xl border border-red-200 shadow-sm col-span-full">Houve um erro ao processar o histórico. Verifique se os dados estão consistentes.</div>';
                }
            },

            renderCharts: () => {
                if(state.view !== 'indicadores') return;
                
                const monthId = document.getElementById('chart_month')?.value || window.app.getMonthId(new Date());
                
                // Filtrar dados para o mês com função segura
                const monthLogs = state.logs.filter(l => window.app.getSafeMonthId(l) === monthId);
                const monthHygiene = state.hygieneChecks.filter(h => window.app.getSafeMonthId(h) === monthId);
                
                // 1. Preparar Dados: Pareto (Ocorrências por Regra)
                const ruleCounts = {};
                monthLogs.forEach(l => {
                    const ruleName = l.ruleId === 'zerar_gratificacao' ? 'Zerado 100%' : (state.rules.find(r => r.id === l.ruleId)?.name || 'Outro');
                    ruleCounts[ruleName] = (ruleCounts[ruleName] || 0) + 1;
                });
                if (monthHygiene.length > 0) {
                    ruleCounts['Higiene Pessoal'] = monthHygiene.length;
                }

                const paretoData = Object.entries(ruleCounts)
                    .map(([name, count]) => ({ name, count }))
                    .sort((a,b) => b.count - a.count); // Ordem decrescente
                
                const totalErrors = paretoData.reduce((acc, curr) => acc + curr.count, 0);
                
                const labelsPareto = [];
                const dataParetoCounts = [];
                const dataParetoCumPct = [];
                let cumulative = 0;

                paretoData.forEach(item => {
                    labelsPareto.push(item.name);
                    dataParetoCounts.push(item.count);
                    cumulative += item.count;
                    dataParetoCumPct.push(totalErrors > 0 ? (cumulative / totalErrors) * 100 : 0);
                });

                // 2. Preparar Dados: Pizza (Ocorrências por Setor)
                const sectorCounts = {};
                [...monthLogs, ...monthHygiene.map(h => ({...h, isHygiene: true}))].forEach(log => {
                    const emp = state.employees.find(e => e.id === log.employeeId);
                    if (emp) {
                        const sec = state.sectors.find(s => s.id === emp.sectorId);
                        const secName = sec ? sec.name : 'Geral';
                        sectorCounts[secName] = (sectorCounts[secName] || 0) + 1;
                    }
                });

                const pieLabels = Object.keys(sectorCounts);
                const pieData = Object.values(sectorCounts);

                // Destruir instâncias antigas para não sobrepor gráficos no canvas
                if (state.chartInstances.pareto) state.chartInstances.pareto.destroy();
                if (state.chartInstances.pie) state.chartInstances.pie.destroy();

                // Renderizar Gráfico de Pareto
                const ctxPareto = document.getElementById('chartPareto');
                if (ctxPareto) {
                    state.chartInstances.pareto = new Chart(ctxPareto, {
                        type: 'bar',
                        data: {
                            labels: labelsPareto,
                            datasets: [
                                {
                                    type: 'line',
                                    label: '% Acumulado',
                                    data: dataParetoCumPct,
                                    borderColor: '#dc2626', // red-600
                                    backgroundColor: '#dc2626',
                                    yAxisID: 'y1',
                                    tension: 0.1,
                                    borderWidth: 2,
                                    pointRadius: 4
                                },
                                {
                                    type: 'bar',
                                    label: 'Quantidade',
                                    data: dataParetoCounts,
                                    backgroundColor: '#eab308', // yellow-500
                                    yAxisID: 'y',
                                    borderRadius: 4
                                }
                            ]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: {
                                legend: { position: 'top' },
                                title: { display: false }
                            },
                            scales: {
                                y: {
                                    type: 'linear',
                                    display: true,
                                    position: 'left',
                                    beginAtZero: true,
                                    title: { display: true, text: 'Total de Ocorrências' }
                                },
                                y1: {
                                    type: 'linear',
                                    display: true,
                                    position: 'right',
                                    beginAtZero: true,
                                    max: 100,
                                    grid: { drawOnChartArea: false }, // só mostra a grelha de um eixo
                                    title: { display: true, text: '% Acumulado' }
                                },
                            }
                        }
                    });
                }

                // Renderizar Gráfico de Pizza
                const ctxPie = document.getElementById('chartPie');
                if (ctxPie) {
                    state.chartInstances.pie = new Chart(ctxPie, {
                        type: 'doughnut',
                        data: {
                            labels: pieLabels,
                            datasets: [{
                                data: pieData,
                                backgroundColor: [
                                    '#eab308', '#dc2626', '#3b82f6', '#10b981', '#8b5cf6', '#f97316', '#64748b',
                                    '#ec4899', '#0ea5e9', '#84cc16', '#14b8a6', '#f43f5e', '#a855f7', '#6366f1',
                                    '#f59e0b', '#22c55e', '#d946ef', '#06b6d4', '#3f6212', '#7f1d1d', '#1e3a8a',
                                    '#4c1d95', '#831843', '#14532d'
                                ],
                                borderWidth: 1
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: {
                                legend: { position: 'right' }
                            }
                        }
                    });
                }
            },

            render: () => {
                const container = document.getElementById('app-container');
                if(!container) return;
                
                let content = '';
                switch (state.view) {
                    case 'dashboard': content = window.app.views.dashboard(); break;
                    case 'colaboradores': content = window.app.views.colaboradores(); break;
                    case 'setores': content = window.app.views.setores(); break;
                    case 'lancamentos': content = window.app.views.lancamentos(); break;
                    case 'higiene': content = window.app.views.higiene(); break;
                    case 'proporcionais': content = window.app.views.proporcionais(); break;
                    case 'relatorios': content = window.app.views.relatorios(); break;
                    case 'indicadores': content = window.app.views.indicadores(); break;

                container.innerHTML = content;

            },

            showSectorForm: (id = null) => {

                window.app.openModal(`
                    <div class="p-4 border-b border-stone-200">

                            <div>
                                <label class="block text-xs font-bold text-stone-500 uppercase mb-1">Val. Liderado</label>

                            </div>
                            <div>
                                <label class="block text-xs font-bold text-stone-500 uppercase mb-1">Val. Líder</label>
                                <input type="number" step="0.01" id="sec_val_lider" value="${sec.val_lider || ''}" required class="w-full p-3 bg-stone-50 border border-stone-300 rounded-lg outline-none focus:border-yellow-500 text-sm">

                window.app.openModal(`

                    const secList = state.sectors.sort((a,b)=>(a.name||'').localeCompare(b.name||'')).map(sec => `

                    const ruleList = state.rules.map(rule => `

                            </div>
                        </div>
                    `;
                },
                lancamentos: () => {
                    const activeTab = state.logTab || 'novo';
                    
                    let content = '';
                    if (activeTab === 'historico') {
                        const monthOpts = [...new Set([...state.logs, ...state.hygieneChecks].map(window.app.getSafeMonthId)), window.app.getMonthId(new Date())].sort().reverse().map(m => `<option value="${m}">${m}</option>`).join('');
                        const sectorOpts = state.sectors.sort((a,b)=>(a.name||'').localeCompare(b.name||'')).map(s => `<option value="${s.id}">${s.name}</option>`).join('');

                        content = `

                                    <select id="hist_sec" class="w-full md:w-1/2 p-3 text-sm border border-stone-300 rounded-lg outline-none focus:border-yellow-500 bg-stone-50"><option value="">Todos os Setores</option>${sectorOpts}</select>
                                </div>
                            </div>
                            <div id="log_history_container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 pb-8"></div>
                        `;
                    } else {
                        const sectorOpts = state.sectors.sort((a,b)=>(a.name||'').localeCompare(b.name||'')).map(s => `<option value="${s.id}">${s.name}</option>`).join('');
                        const ruleOpts = state.rules.filter(r => r.id !== 'higiene').map(r => `<option value="${r.id}">${r.name} (-${window.app.formatPct(r.pct)})</option>`).join('');
                        const today = new Date().toISOString().split('T')[0];

                        content = `

                                                            Marcar Todos
                                                        </label>
                                                        <span id="log_emp_count" class="text-[10px] uppercase text-stone-500 font-bold bg-white px-2 py-1 rounded border border-stone-200 shadow-sm">0 selecionados</span>
                                                    </div>
                                                    <div class="relative w-full">
                                                        <div class="absolute inset-y-0 left-0 pl-2.5 flex items-center pointer-events-none text-stone-400"><i class="fa-solid fa-search text-xs"></i></div>
                                                        <input type="text" id="log_emp_search" placeholder="Filtrar por nome..." class="w-full pl-8 p-2 text-xs border border-stone-300 rounded outline-none focus:border-yellow-500 bg-white">
                                                    </div>
                                                </div>
                                                <div id="emps_list" class="flex-1 overflow-y-auto p-2 space-y-1 bg-white custom-scrollbar">
                                                </div>
                                            </div>
                                        </div>

                                        <div class="space-y-6">
                                            <div>
                                                <label class="block text-xs font-bold text-stone-500 uppercase mb-2">2. Data e Ocorrência</label>
                                                <div class="flex gap-4 mb-4">
                                                    <input type="date" id="log_date" value="${today}" required class="w-1/3 p-3 text-sm border border-stone-300 rounded-lg outline-none focus:border-yellow-500 bg-white">
                                                    <select id="log_rule" required class="flex-1 p-3 text-sm border border-stone-300 rounded-lg outline-none focus:border-yellow-500 bg-white">
                                                        <option value="">Selecione a Infração...</option>
                                                        <option value="zerar_gratificacao" class="text-red-600 font-bold bg-red-50">⚠️ ZERAR GRATIFICAÇÃO (100%)</option>
                                                        ${ruleOpts}
                                                    </select>
                                                </div>
                                                
                                                <label class="block text-xs font-bold text-stone-500 uppercase mb-2">3. Observação (Opcional)</label>

                                            </div>
                                            
                                            <button type="submit" class="w-full py-4 bg-red-600 text-white rounded-xl font-bold shadow-lg shadow-red-600/20 hover:bg-red-700 flex items-center justify-center gap-2 transition-transform active:scale-95">
                                                <i class="fa-solid fa-triangle-exclamation"></i> Registar Penalidade
                                            </button>
                                        </div>
                                    </div>
                                </form>
                            </div>

                    }

                    return `

                        <div class="flex border-b border-stone-200 bg-white sticky top-[60px] z-10 w-full justify-center mb-6">
                            <div class="flex w-full max-w-md md:max-w-2xl">
                                <button data-action="setLogTab" data-id="novo" class="flex-1 py-4 text-sm font-bold border-b-2 transition-colors ${activeTab === 'novo' ? 'border-yellow-500 text-yellow-600' : 'border-transparent text-stone-500'}">Novo Registo</button>
                                <button data-action="setLogTab" data-id="historico" class="flex-1 py-4 text-sm font-bold border-b-2 transition-colors ${activeTab === 'historico' ? 'border-yellow-500 text-yellow-600' : 'border-transparent text-stone-500'}">Consultar Histórico</button>
                            </div>
                        </div>
                        ${content}
                    `;
                },
                higiene: () => {
                    const today = document.getElementById('higiene_date')?.value || new Date().toISOString().split('T')[0];
                    const sectorOpts = state.sectors.sort((a,b)=>(a.name||'').localeCompare(b.name||'')).map(s => `<option value="${s.id}">${s.name}</option>`).join('');
                    let sectorsHtml = '';
                    const grouped = {};
                    state.employees.forEach(emp => { if(!grouped[emp.sectorId]) grouped[emp.sectorId] = []; grouped[emp.sectorId].push(emp); });

                    [...state.sectors].sort((a,b)=>(a.name||'').localeCompare(b.name||'')).forEach(sec => {
                        const emps = grouped[sec.id];
                        if(!emps || emps.length === 0) return;
                        emps.sort((a,b)=>(a.name||'').localeCompare(b.name||''));
                        
                        const empsHtml = emps.map(emp => {
                            const infraction = state.hygieneChecks.find(hc => hc.employeeId === emp.id && hc.date === today);
                            const isChecked = !!infraction;
                            const obsValue = infraction ? (infraction.obs || '') : '';

                            return `
                            <div class="higiene-emp-row flex flex-col justify-center p-4 border border-stone-200 rounded-xl hover:border-yellow-400 hover:shadow-md transition-all bg-white" data-name="${(emp.name||'').toLowerCase()}">
                                <div class="flex items-center justify-between gap-3">
                                    <span class="text-stone-800 font-bold text-sm leading-tight flex-1">${emp.name || 'Colaborador Sem Nome'}</span>
                                    <label class="flex items-center cursor-pointer shrink-0">
                                        <span class="mr-2 text-[10px] sm:text-xs font-black uppercase ${isChecked ? 'text-red-500' : 'text-green-600'}">${isChecked ? 'Penalizado' : 'Tudo OK'}</span>
                                        <input type="checkbox" class="sr-only peer hygiene-checkbox" data-empid="${emp.id}" data-date="${today}" ${isChecked ? 'checked' : ''}>
                                        <div class="relative w-11 h-6 bg-green-500 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-stone-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-red-500"></div>
                                    </label>
                                </div>
                                ${isChecked ? `
                                <div class="mt-3 animate-fade-in w-full">
                                    <input type="text" placeholder="Motivo (ex: sem touca)..." value="${obsValue}" data-empid="${emp.id}" data-date="${today}" class="hygiene-obs-input w-full text-xs p-2.5 border border-red-300 rounded-lg bg-red-50 outline-none text-red-900 placeholder-red-300 focus:border-red-500 shadow-inner">
                                </div>
                                ` : ''}

                        sectorsHtml += `<div class="mb-6 sector-group app-card !p-0 overflow-hidden shadow-sm" data-secid="${sec.id}"><h3 class="bg-stone-50 text-stone-700 px-5 py-3 border-b border-stone-200 font-black text-sm uppercase">${sec.name}</h3><div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 p-4 bg-stone-50/50">${empsHtml}</div></div>`;
                    });

                    return `
                        <div class="flex items-center gap-3 mb-6">
                            <button data-nav="dashboard" class="text-stone-400 hover:text-stone-800 transition-colors" title="Voltar ao Painel">
                                <i class="fa-solid fa-arrow-left text-xl"></i>
                            </button>
                            <h2 class="font-black text-stone-800 text-xl m-0">Inspeção Diária</h2>

                            <div class="flex flex-col md:flex-row gap-4 items-center mb-4">
